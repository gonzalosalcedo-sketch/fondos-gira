<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fondos de Gira — Cuenca del Sur</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#efede6;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.25);
  --ok-bg:#eaf3de;--ok-t:#3b6d11;--ok-b:#639922;
  --wa-bg:#faeeda;--wa-t:#854f0b;--wa-b:#ba7517;
  --er-bg:#fcebeb;--er-t:#a32d2d;--er-b:#e24b4a;
  --in-bg:#e6f1fb;--in-t:#185fa5;--in-b:#378add;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#252525;--bg3:#111;
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#555;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.25);
  --ok-bg:#1a2e0a;--ok-t:#97c459;--ok-b:#3b6d11;
  --wa-bg:#2e1f05;--wa-t:#fac775;--wa-b:#854f0b;
  --er-bg:#2e0a0a;--er-t:#f09595;--er-b:#a32d2d;
  --in-bg:#0a1e35;--in-t:#85b7eb;--in-b:#185fa5;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:1.5rem}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.hdr-brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:500}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.role-pill{font-size:12px;padding:3px 12px;border-radius:999px;border:0.5px solid var(--border)}
.tabs{display:flex;gap:4px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:4px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{flex:1;min-width:80px;padding:8px 8px;border:none;background:transparent;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab.on{background:var(--bg);color:var(--text);border:0.5px solid var(--border);font-weight:500}
.tab:hover:not(.on){background:var(--bg);color:var(--text)}
.panel{display:none}.panel.on{display:block}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.card.er{border-color:var(--er-b);background:var(--er-bg)}
.card.wa{border-color:var(--wa-b);background:var(--wa-bg)}
.ctitle{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.06em}
.div{height:0.5px;background:var(--border);margin:1rem 0}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fi{display:flex;flex-direction:column;gap:4px}
.fi.full{grid-column:1/-1}
label{font-size:12px;color:var(--text2)}
input,select,textarea{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--border2)}
.btn{padding:8px 16px;border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.pr{background:var(--text);color:var(--bg);border-color:var(--text)}.btn.pr:hover{opacity:.85}
.btn.ok{color:var(--ok-t);border-color:var(--ok-b)}.btn.ok:hover{background:var(--ok-bg)}
.btn.er{color:var(--er-t);border-color:var(--er-b)}.btn.er:hover{background:var(--er-bg)}
.btn.in{color:var(--in-t);border-color:var(--in-b)}.btn.in:hover{background:var(--in-bg)}
.btn.wa{color:var(--wa-t);border-color:var(--wa-b)}.btn.wa:hover{background:var(--wa-bg)}
.sb{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500}
.s-borrador{background:var(--bg2);color:var(--text2)}
.s-pendiente{background:var(--wa-bg);color:var(--wa-t)}
.s-aprobado{background:var(--in-bg);color:var(--in-t)}
.s-rendido{background:var(--ok-bg);color:var(--ok-t)}
.s-observado{background:var(--wa-bg);color:var(--wa-t)}
.s-cerrado{background:var(--bg2);color:var(--text2)}
.s-vencido{background:var(--er-bg);color:var(--er-t)}
.nb{background:var(--er-bg);color:var(--er-t);border-radius:999px;font-size:11px;padding:1px 7px;font-weight:500}
.wb{background:var(--wa-bg);color:var(--wa-t);border-radius:999px;font-size:11px;padding:1px 7px;font-weight:500}
.mrow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.mrow4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.met{background:var(--bg2);border-radius:var(--r);padding:12px 14px}
.met .ml{font-size:11px;color:var(--text2);margin-bottom:4px}
.met .mv{font-size:20px;font-weight:500}
.met .ms{font-size:11px;color:var(--text2);margin-top:2px}
.tl{display:flex;flex-direction:column}
.tls{display:flex;gap:12px;padding:8px 0}
.tld{display:flex;flex-direction:column;align-items:center}
.tlc{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;border:0.5px solid var(--border)}
.tll{width:1.5px;flex:1;min-height:8px;background:var(--border);margin:2px 0}
.tlco{flex:1;padding-bottom:6px}
.tlt{font-weight:500;font-size:13px;margin-bottom:2px}
.tlsu{font-size:12px;color:var(--text2)}
.tl-done .tlc{background:var(--ok-bg);color:var(--ok-t);border-color:var(--ok-b)}
.tl-done .tll{background:var(--ok-b)}
.tl-active .tlc{background:var(--text);color:var(--bg);border-color:var(--text)}
.tl-pending .tlc{background:var(--bg2);color:var(--text2)}
.tl-danger .tlc{background:var(--er-bg);color:var(--er-t);border-color:var(--er-b)}
.tl-warn .tlc{background:var(--wa-bg);color:var(--wa-t);border-color:var(--wa-b)}
table.gt{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
table.gt th{text-align:left;padding:8px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border)}
table.gt td{padding:7px 8px;border-bottom:0.5px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
table.gt tr:last-child td{border-bottom:none}
.rr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border)}
.rr:last-child{border-bottom:none}
.rrt{font-weight:500;font-size:15px}
.pbar{display:flex;align-items:center;margin-bottom:1.5rem;overflow-x:auto}
.paso{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);flex-shrink:0}
.pn.done{background:var(--ok-bg);border-color:var(--ok-b);color:var(--ok-t)}
.pn.act{background:var(--text);border-color:var(--text);color:var(--bg)}
.pl{font-size:12px;color:var(--text2)}
.pl.act{color:var(--text);font-weight:500}
.psep{width:24px;height:0.5px;background:var(--border);margin:0 4px;flex-shrink:0}
.cklist{display:flex;flex-direction:column;gap:8px}
.ckitem{display:flex;align-items:center;gap:10px;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;transition:all .15s}
.ckitem:hover{background:var(--bg2)}
.ckitem.on{border-color:var(--ok-b);background:var(--ok-bg)}
.ckitem.on span{color:var(--ok-t)}
.ckitem input[type=checkbox]{width:16px;height:16px;cursor:pointer}
.fbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.fbtn{padding:5px 14px;border:0.5px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
.fbtn.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.pbar2{height:4px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:999px;transition:width .3s}
.ov{display:none;min-height:520px;background:rgba(0,0,0,.52);align-items:flex-start;justify-content:center;margin:-1.5rem;padding:2rem;padding-top:2.5rem}
.ov.open{display:flex}
.ovbox{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border);padding:1.5rem;width:480px;max-width:100%}
.ovbox.er{border:2px solid var(--er-b)}
.ovbox.wa{border:2px solid var(--wa-b)}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg3);padding:1rem}
.login-box{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:2rem;width:380px;max-width:100%}
.idchip{font-family:monospace;font-size:11px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:2px 8px;color:var(--text2)}
/* SOL CARD clickeable */
.sol-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:.75rem;cursor:pointer;transition:all .15s}
.sol-card:hover{border-color:var(--border2);background:var(--bg2)}
.sol-card.er{border-color:var(--er-b);background:var(--er-bg)}
.sol-card.wa{border-color:var(--wa-b);background:var(--wa-bg)}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:10px 16px;border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:8px;z-index:9999;max-width:320px;border:0.5px solid;opacity:0;transition:opacity .3s;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:1.5rem">
      <i class="ti ti-route" style="font-size:40px;color:var(--text2)"></i>
      <div style="font-size:20px;font-weight:500;margin-top:.5rem">Fondos de Gira</div>
      <div style="font-size:13px;color:var(--text2)">Cuenca del Sur</div>
    </div>
    <div class="fi" style="margin-bottom:.75rem">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@cuencadelsur.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fi" style="margin-bottom:1.25rem;position:relative">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn pr" style="width:100%;justify-content:center;padding:11px" onclick="doLogin()" id="login-btn">
      Ingresar
    </button>
    <p style="font-size:12px;color:var(--er-t);margin-top:10px;min-height:16px;text-align:center" id="login-err"></p>
    <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:.5rem">
      Clave por defecto: <strong>cuenca2024</strong>
    </p>
  </div>
</div>

<!-- APP -->
<div id="main-app" style="display:none">
<div class="app">

<!-- OVERLAY ALERTA VENCIMIENTO -->
<div class="ov" id="ov-alerta" role="alertdialog">
  <div class="ovbox er">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
      <i class="ti ti-alert-triangle" style="font-size:22px;color:var(--er-t)"></i>
      <div>
        <div style="font-weight:500;font-size:15px;color:var(--er-t)">Rendiciones vencidas</div>
        <div style="font-size:12px;color:var(--text2)">Más de <span id="alerta-dias">5</span> días desde el regreso sin rendir</div>
      </div>
    </div>
    <div id="alerta-lista" style="margin-bottom:1.25rem"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeOv('ov-alerta')">Recordar más tarde</button>
      <button class="btn er" onclick="closeOv('ov-alerta');showTab('seguimiento')">Ver en seguimiento</button>
    </div>
  </div>
</div>

<!-- OVERLAY OBSERVACION -->
<div class="ov" id="ov-obs" role="dialog">
  <div class="ovbox wa">
    <div style="font-weight:500;font-size:15px;margin-bottom:1rem"><i class="ti ti-message-circle"></i> Devolver con observación</div>
    <div class="fi" style="margin-bottom:1rem">
      <label>Observación para el vendedor</label>
      <textarea id="obs-texto" rows="4" placeholder="Describí qué debe corregir o justificar..."></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeOv('ov-obs')">Cancelar</button>
      <button class="btn wa" onclick="confirmarObservacion()"><i class="ti ti-send"></i> Enviar observación</button>
    </div>
  </div>
</div>

<!-- OVERLAY DENEGAR -->
<div class="ov" id="ov-denegar" role="dialog">
  <div class="ovbox er">
    <div style="font-weight:500;font-size:15px;margin-bottom:1rem"><i class="ti ti-x"></i> Denegar solicitud</div>
    <div class="fi" style="margin-bottom:1rem">
      <label>Motivo de la denegación</label>
      <textarea id="denegar-texto" rows="3" placeholder="Indicá el motivo..."></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeOv('ov-denegar')">Cancelar</button>
      <button class="btn er" onclick="confirmarDenegar()"><i class="ti ti-x"></i> Denegar</button>
    </div>
  </div>
</div>

<!-- OVERLAY CAMBIAR CLAVE -->
<div class="ov" id="ov-clave" role="dialog">
  <div class="ovbox">
    <div style="font-weight:500;font-size:15px;margin-bottom:1rem"><i class="ti ti-lock"></i> Cambiar contraseña</div>
    <div class="fi" style="margin-bottom:.75rem"><label>Nueva contraseña</label><input type="password" id="clave-nueva" placeholder="Mínimo 6 caracteres"></div>
    <div class="fi" style="margin-bottom:1rem"><label>Repetir nueva contraseña</label><input type="password" id="clave-rep" placeholder="Repetir contraseña"></div>
    <p style="font-size:12px;color:var(--er-t);min-height:16px;margin-bottom:.75rem" id="clave-err"></p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeOv('ov-clave')">Cancelar</button>
      <button class="btn pr" onclick="guardarClave()"><i class="ti ti-check"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- OVERLAY CONFIG (solo tesorero) -->
<div class="ov" id="ov-cfg" role="dialog">
  <div class="ovbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <div style="font-weight:500;font-size:15px"><i class="ti ti-settings"></i> Configuración</div>
      <button class="btn" onclick="closeOv('ov-cfg')"><i class="ti ti-x"></i></button>
    </div>
    <div class="fi" style="margin-bottom:.75rem"><label>Viáticos por día ($)</label><input type="number" id="cfg-viat"></div>
    <div class="fi" style="margin-bottom:.75rem"><label>Hospedaje por día ($)</label><input type="number" id="cfg-hosp"></div>
    <div class="fi" style="margin-bottom:1rem"><label>Días límite para rendir</label><input type="number" id="cfg-dias"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeOv('ov-cfg')">Cancelar</button>
      <button class="btn pr" onclick="guardarConfig()">Guardar</button>
    </div>
  </div>
</div>

<!-- OVERLAY GESTIÓN USUARIOS (solo tesorero) -->
<div class="ov" id="ov-usuarios" role="dialog">
  <div class="ovbox" style="width:560px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <div style="font-weight:500;font-size:15px"><i class="ti ti-users"></i> Gestión de usuarios</div>
      <button class="btn" onclick="closeOv('ov-usuarios')"><i class="ti ti-x"></i></button>
    </div>
    <div id="usuarios-lista" style="margin-bottom:1rem;max-height:300px;overflow-y:auto"></div>
    <div style="border-top:0.5px solid var(--border);padding-top:1rem">
      <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:.75rem">AGREGAR USUARIO</div>
      <div class="fg" style="margin-bottom:.75rem">
        <div class="fi"><label>Nombre</label><input id="nu-nombre" placeholder="Nombre completo"></div>
        <div class="fi"><label>Email</label><input type="email" id="nu-email" placeholder="correo@cuencadelsur.com"></div>
        <div class="fi"><label>Rol</label>
          <select id="nu-rol"><option value="vendedor">Vendedor</option><option value="tesorero">Tesorero</option></select>
        </div>
        <div class="fi"><label>Clave inicial</label><input type="text" id="nu-clave" value="cuenca2024"></div>
      </div>
      <button class="btn ok" onclick="agregarUsuario()"><i class="ti ti-plus"></i> Agregar usuario</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <i class="ti ti-route" style="font-size:22px"></i>
    Fondos de Gira
    <span class="role-pill" id="role-pill">—</span>
  </div>
  <div class="hdr-right">
    <span style="font-size:12px;color:var(--text2)" id="hdr-user"></span>
    <button class="btn" onclick="openOv('ov-clave')" title="Cambiar contraseña"><i class="ti ti-lock"></i></button>
    <button class="btn" id="btn-usuarios" style="display:none" onclick="abrirUsuarios()"><i class="ti ti-users"></i> Usuarios</button>
    <button class="btn" id="btn-cfg" style="display:none" onclick="openCfg()"><i class="ti ti-settings"></i></button>
    <button class="btn pr" id="btn-nueva" style="display:none" onclick="nuevaSolicitud()"><i class="ti ti-plus"></i> Nueva gira</button>
    <button class="btn" onclick="logout()" title="Salir"><i class="ti ti-logout"></i></button>
  </div>
</div>

<!-- TABS -->
<div class="tabs" role="tablist" id="tab-bar">
  <button class="tab on" id="t-solicitudes" onclick="showTab('solicitudes')"><i class="ti ti-list"></i> Mis solicitudes</button>
  <button class="tab" id="t-seguimiento" onclick="showTab('seguimiento')" style="display:none"><i class="ti ti-chart-gantt"></i> Seguimiento <span class="wb" id="badge-seg" style="display:none">0</span></button>
  <button class="tab" id="t-nueva" onclick="showTab('nueva')" style="display:none"><i class="ti ti-forms"></i> Formulario</button>
  <button class="tab" id="t-rendicion" onclick="showTab('rendicion')" style="display:none"><i class="ti ti-receipt"></i> Rendición</button>
  <button class="tab" id="t-tesoreria" onclick="showTab('tesoreria')" style="display:none"><i class="ti ti-building-bank"></i> Tesorería <span class="nb" id="badge-tes" style="display:none">0</span></button>
  <button class="tab" id="t-dashboard" onclick="showTab('dashboard')" style="display:none"><i class="ti ti-chart-bar"></i> Dashboard</button>
</div>

<!-- PANELS -->
<div id="panel-solicitudes" class="panel on"></div>
<div id="panel-seguimiento" class="panel"></div>
<div id="panel-nueva" class="panel"><div class="pbar" id="paso-bar"></div><div id="step-content"></div></div>
<div id="panel-rendicion" class="panel"></div>
<div id="panel-tesoreria" class="panel"></div>
<div id="panel-dashboard" class="panel"></div>

<div id="toast"></div>
</div>
</div>

<script>
const AS_URL = 'https://script.google.com/macros/s/AKfycbz5afFEsf7XwkiVPXDVC_SsdFD7SGWO9dCZxYwr9aCS58IOI-nFtzCqdef6rVnGoQ6WDw/exec';
const APP_URL = 'https://gonzalosalcedo-sketch.github.io/fondos-gira';
const CLAVE_DEFAULT = 'cuenca2024';

const RUBROS=[
  {cod:170,desc:'Pasajes y Movilidad'},{cod:172,desc:'Viáticos y Refrigerios'},
  {cod:174,desc:'Alojamiento'},{cod:138,desc:'Combustible Rodados'},
  {cod:144,desc:'Mantenimiento Rodados'},{cod:150,desc:'Reparaciones Rodados'},

function api(params){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*9999);
    window[cb]=(data)=>{
      delete window[cb];
      document.getElementById(cb)&&document.getElementById(cb).remove();
      if(data&&data.error) reject(new Error(data.error));
      else resolve(data);
    };
    params.callback=cb;
    const url=AS_URL+'?'+new URLSearchParams(params).toString();
    const s=document.createElement('script');
    s.id=cb; s.src=url;
    s.onerror=()=>{delete window[cb];reject(new Error('Error de red'));};
    document.head.appendChild(s);
    setTimeout(()=>{delete window[cb];s.remove&&s.remove();reject(new Error('Timeout'));},20000);
  });
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Completá email y contraseña.';return;}
  btn.disabled=true;
  btn.innerHTML='<div class="spin"></div> Verificando...';
  try {
    const result=await api({action:'loginUsuario',email,clave:pass});
    if(result.ok){
      USER={email:result.email,nombre:result.nombre,rol:result.rol};
      ROL=result.rol;
      initApp();
    } else {
      err.textContent=result.error||'Email o contraseña incorrectos.';
      btn.disabled=false;
      btn.innerHTML='Ingresar';
    }
  } catch(e){
    err.textContent='Error de conexión: '+e.message;
    btn.disabled=false;
    btn.innerHTML='Ingresar';
  }
}

async function cargarDatos(){
  document.getElementById('panel-solicitudes').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:3rem;color:var(--text2)"><div class="spin"></div> Cargando...</div>';
  try {
    const [sols,cfgData]=await Promise.all([
      api({action:'getSolicitudes'}),
      api({action:'getConfig'})
    ]);
    solicitudes=Array.isArray(sols)?sols.map(parseSol):[];
    if(cfgData&&!cfgData.error){
      CFG.viaticos=parseFloat(cfgData.viaticos)||60000;
      CFG.hospedaje=parseFloat(cfgData.hospedaje)||100000;
      CFG.diasLimite=parseInt(cfgData.diasLimite)||5;
    }
    for(const s of solicitudes.filter(x=>['aprobado','rendido','observado','cerrado'].includes(x.status))){
      try{
        const g=await api({action:'getGastos',id:s.id});
        s.gastos=Array.isArray(g)?g.map(r=>({tipo:r.tipo,rubro:parseInt(r.rubro)||172,detalle:r.detalle,importe:parseFloat(r.importe)||0})):[];
      }catch{s.gastos=[];}
    }
  } catch(e){
    showToast('Error al cargar datos: '+e.message,'er');
  }
  updateBadges();
  renderSolicitudes();
  setTimeout(checkVencimientos,700);
}

function parseSol(s){
  return{
    id:s.ID||s.id||'',status:s.Status||s.status||'borrador',
    solicitante:s.Solicitante||'',email:s.EmailSolicitante||s.email||'',
    jefe:s.Jefe||'',destino:s.Destino||'',
    fechaSalida:s.FechaSalida||'',fechaLlegada:s.FechaLlegada||'',
    dias:parseInt(s.Dias)||0,viaticos:parseFloat(s.Viaticos)||0,
    hospedaje:parseFloat(s.Hospedaje)||0,reserva:parseFloat(s.Reserva)||0,
    transporte:s.Transporte||'',
    checks:Array.isArray(s.Checks)?s.Checks:[],
    observacion:s.Observacion||'',gastos:[]
  };
}

// ══════════════════════════════════════════════
function fmt(n){return'$'+Math.round(n||0).toLocaleString('es-AR')}
function diasDesde(f){if(!f)return null;const d=new Date(f);d.setHours(0,0,0,0);return Math.floor((TODAY-d)/86400000)}
function estaVencida(s){if(s.status!=='aprobado')return false;const d=diasDesde(s.fechaLlegada);return d!==null&&d>CFG.diasLimite}
function diasRestantes(s){if(s.status!=='aprobado'||!s.fechaLlegada)return null;return CFG.diasLimite-(diasDesde(s.fechaLlegada)||0)}
function total(s){return(s.viaticos||0)+(s.hospedaje||0)+(s.reserva||0)}
function gastado(s){return(s.gastos||[]).reduce((a,g)=>a+(parseFloat(g.importe)||0),0)}
function updateBadges(){
  const tes=solicitudes.filter(s=>s.status==='pendiente'||s.status==='rendido').length;
  const seg=solicitudes.filter(s=>estaVencida(s)).length;
  const bt=document.getElementById('badge-tes');
  const bs=document.getElementById('badge-seg');
  if(bt){bt.textContent=tes;bt.style.display=tes?'':'none';}
  if(bs){bs.textContent=seg;bs.style.display=seg?'':'none';}
}
function openOv(id){document.getElementById(id).classList.add('open')}
function closeOv(id){document.getElementById(id).classList.remove('open')}
let toastT;
function showToast(msg,type='in'){
  const t=document.getElementById('toast');
  const m={ok:['var(--ok-bg)','var(--ok-t)','var(--ok-b)','ti-check'],
    wa:['var(--wa-bg)','var(--wa-t)','var(--wa-b)','ti-alert-triangle'],
    er:['var(--er-bg)','var(--er-t)','var(--er-b)','ti-alert-circle'],
    in:['var(--in-bg)','var(--in-t)','var(--in-b)','ti-info-circle']};
  const[bg,c,b,ic]=m[type]||m.in;
  t.style.background=bg;t.style.color=c;t.style.borderColor=b;t.style.opacity='1';
  t.innerHTML='<i class="ti '+ic+'"></i>'+msg;
  clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity='0',3800);
}

function renderSeguimiento(){
  const el=document.getElementById('panel-seguimiento');
  const todo=solicitudes.filter(s=>s.status!=='borrador');
  const groups={
    todos:todo,
    activas:todo.filter(s=>s.status==='pendiente'||s.status==='aprobado'),
    vencidas:todo.filter(s=>estaVencida(s)),
    observadas:todo.filter(s=>s.status==='observado'),
    rendidas:todo.filter(s=>s.status==='rendido'),
    cerradas:todo.filter(s=>s.status==='cerrado')
  };
  const filtered=groups[filterSeg]||todo;
  el.innerHTML=`
    <div class="fbar">
      ${Object.entries({todos:'Todas',activas:'En curso',vencidas:'Vencidas',observadas:'Observadas',rendidas:'Rendidas',cerradas:'Cerradas'}).map(([k,l])=>
        `<button class="fbtn${filterSeg===k?' on':''}" onclick="filterSeg='${k}';renderSeguimiento()">

function cardSeg(s,idx){
  const tot=total(s),gas=gastado(s);
  const pct=tot>0?Math.min(100,Math.round(gas/tot*100)):0;
  const venc=estaVencida(s),dr=diasRestantes(s),dias=diasDesde(s.fechaLlegada);
  const steps=[
    {l:'Solicitud creada',sub:s.fechaSalida?`Salida: ${s.fechaSalida}`:'',done:true,act:false,err:false,wa:false},
    {l:'Aprobación tesorero',sub:s.status==='pendiente'?'Esperando':'Aprobado',done:!['pendiente','borrador','denegado'].includes(s.status),act:s.status==='pendiente',err:s.status==='denegado',wa:false},
    {l:'Fondos entregados',sub:tot?fmt(tot):'—',done:['aprobado','rendido','observado','cerrado'].includes(s.status),act:false,err:false,wa:false},
    {l:'Rendición del usuario',sub:s.status==='aprobado'?(venc?`${dias} días sin rendir`:dr!==null?`${dr>0?dr+' días para rendir':'Vence hoy'}`:'En curso'):s.status==='observado'?'Devuelta con observaciones':['rendido','cerrado'].includes(s.status)?`${(s.gastos||[]).length} comprobantes · ${fmt(gas)}`:'Pendiente',
      done:['rendido','cerrado'].includes(s.status),act:s.status==='aprobado'&&!venc,err:venc&&s.status==='aprobado',wa:s.status==='observado'},
    {l:'Cierre tesorero',sub:s.status==='cerrado'?'Archivado':'Pendiente',done:s.status==='cerrado',act:s.status==='rendido',err:false,wa:false},
  ];
  return `<div class="card${venc?' er':s.status==='observado'?' wa':''}" style="margin-bottom:1rem">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
      <div>
        <div style="font-weight:500;font-size:15px;margin-bottom:3px">${s.destino||'—'}</div>
        <div style="font-size:12px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span>${s.solicitante}</span><span class="idchip">${s.id}</span>
          <span>${s.fechaSalida||'?'} → ${s.fechaLlegada||'?'}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="sb s-${venc?'vencido':s.status}">${venc?'<i class="ti ti-alert-triangle"></i> Vencida':ESTADOS[s.status]||s.status}</span>
        ${['aprobado','rendido','observado','cerrado'].includes(s.status)?`<button class="btn in" style="padding:5px 12px;font-size:12px" onclick="irRendicion(${idx})"><i class="ti ti-eye"></i> Ver</button>`:''}
      </div>
    </div>
    <div class="tl">
      ${steps.map((st,si)=>`
        <div class="tls ${st.done?'tl-done':st.err?'tl-danger':st.wa?'tl-warn':st.act?'tl-active':'tl-pending'}">
          <div class="tld">
            <div class="tlc">${st.done?'<i class="ti ti-check"></i>':st.err?'<i class="ti ti-x"></i>':st.wa?'<i class="ti ti-alert-triangle"></i>':si+1}</div>
            ${si<steps.length-1?'<div class="tll"></div>':''}
          </div>
          <div class="tlco"><div class="tlt">${st.l}</div><div class="tlsu">${st.sub}</div></div>
        </div>`).join('')}
    </div>
    ${['aprobado','rendido','observado','cerrado'].includes(s.status)?`
      <div class="div"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-size:12px;color:var(--text2)">Avance de gastos</div>
        <div style="font-size:12px;font-weight:500">${fmt(gas)} / ${fmt(tot)} (${pct}%)</div>
      </div>
      <div class="pbar2"><div class="pfill" style="width:${pct}%;background:var(--${pct>=100?'er':pct>=70?'wa':'ok'}-t)"></div></div>
    `:''}
  </div>`;
}

function renderStep(){
  const pb=document.getElementById('paso-bar');
  const labels=['Datos','Fondos','Transporte','Confirmar'];
  pb.innerHTML=labels.map((l,i)=>{
    const n=i+1,done=n<currentStep,act=n===currentStep;
    return `<div class="paso"><div class="pn${done?' done':act?' act':''}">${done?'<i class="ti ti-check"></i>':n}</div><div class="pl${act?' act':''}">${l}</div></div>${i<labels.length-1?'<div class="psep"></div>':''}`;
  }).join('');
  const sc=document.getElementById('step-content');
  if(currentStep===1){
    sc.innerHTML=`<div class="card"><div class="ctitle">Datos generales</div>
      <div class="fg">
        <div class="fi"><label>Solicitante</label><input id="f-sol" value="${currentSol.solicitante}" placeholder="Nombre completo"></div>
        <div class="fi"><label>Email</label><input type="email" id="f-email" value="${currentSol.email}" placeholder="correo@cuencadelsur.com"></div>
        <div class="fi"><label>Autorizante</label><input id="f-jefe" value="${currentSol.jefe}" placeholder="Nombre del autorizante"></div>
        <div class="fi"></div>
        <div class="fi full"><label>Destino / Motivo</label><input id="f-dest" value="${currentSol.destino}" placeholder="Ej: Mendoza — reunión clientes zona cuyo"></div>
        <div class="fi"><label>Fecha de salida</label><input type="date" id="f-sal" value="${currentSol.fechaSalida}" onchange="calcDias()"></div>
        <div class="fi"><label>Fecha de regreso</label><input type="date" id="f-lleg" value="${currentSol.fechaLlegada}" onchange="calcDias()"></div>
      </div>
      <div style="margin-top:.75rem;font-size:13px;color:var(--text2)" id="dias-info">${currentSol.dias?`<strong>${currentSol.dias} días</strong>`:'Seleccioná las fechas.'}</div>
    </div>
    <div style="display:flex;justify-content:flex-end"><button class="btn pr" onclick="nextStep()">Siguiente <i class="ti ti-arrow-right"></i></button></div>`;
  } else if(currentStep===2){
    const d=currentSol.dias||1;
    const v=currentSol.viaticos||(CFG.viaticos*d);
    const h=currentSol.hospedaje||(CFG.hospedaje*d);
    const r=currentSol.reserva||0;
    sc.innerHTML=`<div class="card"><div class="ctitle">Fondos solicitados</div>
      <div style="font-size:12px;color:var(--in-t);background:var(--in-bg);border:0.5px solid var(--in-b);border-radius:var(--r);padding:8px 12px;margin-bottom:1rem">
        <i class="ti ti-info-circle"></i> Tarifas: Viáticos ${fmt(CFG.viaticos)}/día · Hospedaje ${fmt(CFG.hospedaje)}/día
      </div>
      <div class="mrow">
        <div class="met"><div class="ml">Duración</div><div class="mv">${d}</div><div class="ms">días</div></div>
        <div class="met"><div class="ml">Viáticos calculados</div><div class="mv">${fmt(v)}</div></div>
        <div class="met"><div class="ml">Hospedaje calculado</div><div class="mv">${fmt(h)}</div></div>
      </div>
      <div class="fg">
        <div class="fi"><label>Viáticos ($)</label><input type="number" id="f-viat" value="${v}" oninput="updT()"></div>
        <div class="fi"><label>Hospedaje ($)</label><input type="number" id="f-hosp" value="${h}" oninput="updT()"></div>
        <div class="fi"><label>Fondo reserva ($)</label><input type="number" id="f-res" value="${r}" placeholder="Redondeo / imprevisto" oninput="updT()"></div>
        <div class="met" style="display:flex;flex-direction:column;justify-content:center">
          <div class="ml">Total a entregar</div><div class="mv" id="m-tot">${fmt(v+h+r)}</div>
        </div>
      </div></div>
      <div style="display:flex;justify-content:space-between">
        <button class="btn" onclick="prevStep()"><i class="ti ti-arrow-left"></i> Atrás</button>
        <button class="btn pr" onclick="nextStep()">Siguiente <i class="ti ti-arrow-right"></i></button>
      </div>`;
  } else if(currentStep===3){
    sc.innerHTML=`<div class="card"><div class="ctitle">Transporte</div>
      <div class="fi" style="margin-bottom:1.25rem"><label>Tipo de transporte</label>
        <select id="f-trans" onchange="toggleChecks()">${TRANSPORTES.map(t=>`<option${currentSol.transporte===t?' selected':''}>${t}</option>`).join('')}</select>
      </div>
      <div id="checks-container"></div></div>
      <div style="display:flex;justify-content:space-between">
        <button class="btn" onclick="prevStep()"><i class="ti ti-arrow-left"></i> Atrás</button>
        <button class="btn pr" onclick="nextStep()">Siguiente <i class="ti ti-arrow-right"></i></button>
      </div>`;
    toggleChecks();
  } else if(currentStep===4){
    const tot=(currentSol.viaticos||0)+(currentSol.hospedaje||0)+(currentSol.reserva||0);
    const ok=currentSol.solicitante&&currentSol.destino&&currentSol.email;
    sc.innerHTML=`<div class="card"><div class="ctitle">Confirmación</div>
      <div class="rr"><span style="color:var(--text2)">Solicitante</span><strong>${currentSol.solicitante||'—'}</strong></div>
      <div class="rr"><span style="color:var(--text2)">Email</span><strong>${currentSol.email||'—'}</strong></div>
      <div class="rr"><span style="color:var(--text2)">Autorizante</span><strong>${currentSol.jefe||'—'}</strong></div>
      <div class="rr"><span style="color:var(--text2)">Destino</span><strong>${currentSol.destino||'—'}</strong></div>
      <div class="rr"><span style="color:var(--text2)">Período</span><strong>${currentSol.fechaSalida} → ${currentSol.fechaLlegada} (${currentSol.dias} días)</strong></div>
      <div class="rr"><span style="color:var(--text2)">Viáticos</span><strong>${fmt(currentSol.viaticos)}</strong></div>
      <div class="rr"><span style="color:var(--text2)">Hospedaje</span><strong>${fmt(currentSol.hospedaje)}</strong></div>
      <div class="rr"><span style="color:var(--text2)">Reserva</span><strong>${fmt(currentSol.reserva)}</strong></div>
      <div class="rr rrt"><span>Total a recibir</span><span>${fmt(tot)}</span></div>
      <div class="rr"><span style="color:var(--text2)">Transporte</span><strong>${currentSol.transporte}</strong></div>
      ${currentSol.checks&&currentSol.checks.length?`<div class="rr"><span style="color:var(--text2)">Verificaciones</span><strong style="color:var(--ok-t)">${currentSol.checks.length}/${CHECKS_VEH.length} OK</strong></div>`:''}
    </div>
    ${!ok?`<div style="font-size:13px;color:var(--er-t);background:var(--er-bg);border:0.5px solid var(--er-b);border-radius:var(--r);padding:8px 12px;margin-bottom:1rem"><i class="ti ti-alert-triangle"></i> Completá nombre, email y destino.</div>`:''}
    <div style="display:flex;justify-content:space-between">
      <button class="btn" onclick="prevStep()"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn pr" onclick="enviarSolicitud()" ${!ok?'disabled':''}>
        <i class="ti ti-send"></i> Enviar al tesorero
      </button>
    </div>`;
  }
}

function calcDias(){
  const s=document.getElementById('f-sal').value,l=document.getElementById('f-lleg').value;
  if(s&&l){const d=Math.max(1,Math.round((new Date(l)-new Date(s))/86400000)+1);document.getElementById('dias-info').innerHTML=`<strong>${d} días</strong>`;currentSol.diasTemp=d;}
}
function updT(){
  const v=parseFloat(document.getElementById('f-viat').value)||0;
  const h=parseFloat(document.getElementById('f-hosp').value)||0;
  const r=parseFloat(document.getElementById('f-res').value)||0;
  document.getElementById('m-tot').textContent=fmt(v+h+r);
}
function toggleChecks(){
  const trans=document.getElementById('f-trans').value;
  const isV=trans==='Vehículo empresa'||trans==='Vehículo propio';
  const el=document.getElementById('checks-container');
  if(!isV){el.innerHTML=`<p style="font-size:13px;color:var(--text2);padding:8px 0"><i class="ti ti-info-circle"></i> Sin verificaciones para este transporte.</p>`;return;}
  const saved=currentSol.checks||[];
  el.innerHTML=`<div class="ctitle">Verificación del vehículo</div><div class="cklist" style="margin-top:.5rem">
    ${CHECKS_VEH.map((c,i)=>`<label class="ckitem${saved.includes(c)?' on':''}" id="ci-${i}">
      <input type="checkbox" ${saved.includes(c)?'checked':''} onchange="toggleCheck(this,'${c}',${i})"><span>${c}</span>
    </label>`).join('')}</div>`;
}
function toggleCheck(el,val,i){
  if(!currentSol.checks)currentSol.checks=[];
  if(el.checked){if(!currentSol.checks.includes(val))currentSol.checks.push(val);}
  else currentSol.checks=currentSol.checks.filter(x=>x!==val);
  document.getElementById('ci-'+i).classList.toggle('on',el.checked);
}
function nextStep(){
  if(currentStep===1){
    currentSol.solicitante=document.getElementById('f-sol').value.trim();
    currentSol.email=document.getElementById('f-email').value.trim();
    currentSol.jefe=document.getElementById('f-jefe').value.trim();
    currentSol.destino=document.getElementById('f-dest').value.trim();
    currentSol.fechaSalida=document.getElementById('f-sal').value;
    currentSol.fechaLlegada=document.getElementById('f-lleg').value;
    const fs=currentSol.fechaSalida,fl=currentSol.fechaLlegada;
    currentSol.dias=fs&&fl?Math.max(1,Math.round((new Date(fl)-new Date(fs))/86400000)+1):1;
  } else if(currentStep===2){
    currentSol.viaticos=parseFloat(document.getElementById('f-viat').value)||0;
    currentSol.hospedaje=parseFloat(document.getElementById('f-hosp').value)||0;
    currentSol.reserva=parseFloat(document.getElementById('f-res').value)||0;
  } else if(currentStep===3){
    currentSol.transporte=document.getElementById('f-trans').value;
  }
  if(currentStep<4)currentStep++;
  renderStep();
}
function prevStep(){if(currentStep>1)currentStep--;renderStep();}

async function enviarSolicitud(){
  currentSol.status='pendiente';
  const btn=event.currentTarget;
  btn.disabled=true;btn.innerHTML='<div class="spin"></div> Enviando...';
  try {
    const tot=(currentSol.viaticos||0)+(currentSol.hospedaje||0)+(currentSol.reserva||0);
    const res=await api({action:'saveSolicitud',solicitante:currentSol.solicitante,
      emailSolicitante:currentSol.email,jefe:currentSol.jefe,destino:currentSol.destino,
      fechaSalida:currentSol.fechaSalida,fechaLlegada:currentSol.fechaLlegada,dias:currentSol.dias,
      viaticos:currentSol.viaticos,hospedaje:currentSol.hospedaje,reserva:currentSol.reserva,
      transporte:currentSol.transporte,checks:JSON.stringify(currentSol.checks||[]),status:'pendiente'});
    currentSol.id=res.id||'';
    await api({action:'sendMail',tipo:'solicitud_nueva',id:currentSol.id,
      solicitante:currentSol.solicitante,emailSolicitante:currentSol.email,
      destino:currentSol.destino,fechaSalida:currentSol.fechaSalida,
      fechaLlegada:currentSol.fechaLlegada,dias:currentSol.dias,
      viaticos:currentSol.viaticos,hospedaje:currentSol.hospedaje,
      reserva:currentSol.reserva,total:tot,transporte:currentSol.transporte});
    solicitudes.push(currentSol);
    document.getElementById('t-nueva').style.display='none';
    updateBadges();showTab('solicitudes');
    showToast('Solicitud enviada. El tesorero recibió un mail.','ok');
  } catch(e){
    showToast('Error: '+e.message,'er');
    btn.disabled=false;btn.innerHTML='<i class="ti ti-send"></i> Enviar al tesorero';
  }
}

function irRendicion(idx){
  currentSol=solicitudes[idx];
  gastoRows=currentSol.gastos?JSON.parse(JSON.stringify(currentSol.gastos)):[];
  document.getElementById('t-rendicion').style.display='';
  showTab('rendicion');
}

function renderRendicion(){
  const el=document.getElementById('panel-rendicion');
  if(!currentSol){el.innerHTML=`<div class="card" style="text-align:center;padding:3rem"><p style="color:var(--text2)">Seleccioná una solicitud para ver la rendición.</p></div>`;return;}
  const tot=total(currentSol);
  const gasAct=gastoRows.reduce((a,g)=>a+(parseFloat(g.importe)||0),0);
  const saldo=tot-gasAct;
  const isT=ROL==='tesorero';
  const editable=!isT&&(currentSol.status==='aprobado'||currentSol.status==='observado');
  const byTipo={};
  gastoRows.forEach(g=>{byTipo[g.tipo]=(byTipo[g.tipo]||0)+(parseFloat(g.importe)||0);});

  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">
      <button class="btn" onclick="showTab('solicitudes');document.getElementById('t-rendicion').style.display='none'"><i class="ti ti-arrow-left"></i> Volver</button>
      <div style="flex:1">
        <div style="font-weight:500;font-size:15px">${currentSol.destino}</div>
        <div style="font-size:12px;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span>${currentSol.solicitante}</span>
          <span class="idchip">${currentSol.id}</span>
          <span class="sb s-${estaVencida(currentSol)?'vencido':currentSol.status}">${estaVencida(currentSol)?'Vencida':ESTADOS[currentSol.status]||currentSol.status}</span>
        </div>
      </div>
    </div>
    ${currentSol.status==='observado'?`<div style="font-size:13px;color:var(--wa-t);background:var(--wa-bg);border:0.5px solid var(--wa-b);border-radius:var(--r);padding:10px 14px;margin-bottom:1rem"><i class="ti ti-message-circle"></i> <strong>Observación:</strong> ${currentSol.observacion}</div>`:''}
    <div class="card">
      <div class="mrow">
        <div class="met"><div class="ml">Fondos recibidos</div><div class="mv">${fmt(tot)}</div></div>
        <div class="met"><div class="ml">Gastado</div><div class="mv" id="rm-g">${fmt(gasAct)}</div></div>
        <div class="met"><div class="ml">${saldo>=0?'A reintegrar':'A recibir'}</div>
          <div class="mv" id="rm-s" style="color:var(--${saldo>=0?'wa':'ok'}-t)">${fmt(Math.abs(saldo))}</div></div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div class="ctitle" style="margin-bottom:0">Comprobantes</div>
        ${editable?`<div style="display:flex;gap:8px">
          <button class="btn" onclick="simScan()"><i class="ti ti-camera"></i> Escanear</button>
          <button class="btn in" onclick="addGasto()"><i class="ti ti-plus"></i> Agregar</button>
        </div>`:''}
      </div>
      <div id="gt"></div>
    </div>
    <div class="card">
      <div class="ctitle">Resumen por tipo de comprobante</div>
      <div id="rcomp">${renderResumen(byTipo,gasAct,saldo)}</div>
    </div>
    ${editable?`<div style="display:flex;justify-content:flex-end">
      <button class="btn pr" onclick="${currentSol.status==='observado'?'reenviarRendicion()':'enviarRendicion()}'}">
        <i class="ti ti-send"></i> ${currentSol.status==='observado'?'Reenviar rendición corregida':'Enviar rendición al tesorero'}
      </button>
    </div>`:''}
    ${currentSol.status==='rendido'&&!isT?`<div style="font-size:13px;color:var(--ok-t);background:var(--ok-bg);border:0.5px solid var(--ok-b);border-radius:var(--r);padding:10px 14px">
      <i class="ti ti-check"></i> Rendición enviada — el tesorero está revisando.
    </div>`:''}
    ${currentSol.status==='cerrado'?`<div style="font-size:13px;color:var(--text2);background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 14px">
      <i class="ti ti-archive"></i> Rendición cerrada y archivada.
    </div>`:''}
  `;
  renderGastoTable();
}

function renderResumen(byTipo,gasAct,saldo){
  if(!Object.keys(byTipo).length)return'<p style="font-size:13px;color:var(--text2)">Sin gastos cargados.</p>';
  return Object.entries(byTipo).map(([t,v])=>`<div class="rr"><span style="color:var(--text2)">${t}</span><strong>${fmt(v)}</strong></div>`).join('')
    +`<div class="rr rrt"><span>Total</span><span>${fmt(gasAct)}</span></div>
    <div class="rr"><span style="color:var(--text2)">${saldo>=0?'A reintegrar':'El tesorero debe abonar'}</span>
    <span style="font-weight:500;color:var(--${saldo>=0?'wa':'ok'}-t)">${fmt(Math.abs(saldo))}</span></div>`;
}
function addGasto(){gastoRows.push({tipo:'Factura B',rubro:172,detalle:'',importe:0});renderGastoTable();}
function removeGasto(i){gastoRows.splice(i,1);renderGastoTable();}
function renderGastoTable(){
  const el=document.getElementById('gt');if(!el)return;
  const ro=currentSol.status==='rendido'||currentSol.status==='cerrado'||(ROL==='tesorero');
  if(!gastoRows.length){el.innerHTML=`<p style="font-size:13px;color:var(--text2);text-align:center;padding:1rem">Sin comprobantes cargados.</p>`;updR();return;}
  if(ro){
    el.innerHTML=`<table class="gt"><colgroup><col style="width:25%"><col style="width:30%"><col style="width:28%"><col style="width:17%"></colgroup>
      <thead><tr><th>Tipo</th><th>Rubro</th><th>Detalle</th><th style="text-align:right">Importe</th></tr></thead>
      <tbody>${gastoRows.map(g=>`<tr><td>${g.tipo}</td><td style="font-size:12px;color:var(--text2)">${RUBROS.find(r=>r.cod===g.rubro)?.desc||g.rubro}</td><td>${g.detalle}</td><td style="text-align:right">${fmt(g.importe)}</td></tr>`).join('')}</tbody>
    </table>`;
  } else {
    el.innerHTML=`<table class="gt"><colgroup><col style="width:20%"><col style="width:27%"><col style="width:23%"><col style="width:16%"><col style="width:14%"></colgroup>
      <thead><tr><th>Tipo</th><th>Rubro</th><th>Detalle</th><th>Importe</th><th></th></tr></thead>
      <tbody>${gastoRows.map((g,i)=>`<tr>
        <td><select style="font-size:12px;padding:3px 5px" onchange="gastoRows[${i}].tipo=this.value;updR()">${TIPOS.map(t=>`<option${g.tipo===t?' selected':''}>${t}</option>`).join('')}</select></td>
        <td><select style="font-size:12px;padding:3px 5px" onchange="gastoRows[${i}].rubro=parseInt(this.value);updR()">${RUBROS.map(r=>`<option value="${r.cod}"${g.rubro===r.cod?' selected':''}>${r.desc}</option>`).join('')}</select></td>
        <td><input style="font-size:12px;padding:3px 6px" value="${g.detalle}" placeholder="Descripción" oninput="gastoRows[${i}].detalle=this.value"></td>
        <td><input type="number" style="font-size:12px;padding:3px 6px" value="${g.importe||''}" placeholder="0" oninput="gastoRows[${i}].importe=parseFloat(this.value)||0;updR()"></td>
        <td><button class="btn er" style="padding:3px 8px" onclick="removeGasto(${i})"><i class="ti ti-trash"></i></button></td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  updR();
}
function updR(){
  const tot=total(currentSol);
  const gasAct=gastoRows.reduce((a,g)=>a+(parseFloat(g.importe)||0),0);
  const saldo=tot-gasAct;
  const eg=document.getElementById('rm-g'),es=document.getElementById('rm-s');
  if(eg)eg.textContent=fmt(gasAct);
  if(es){es.textContent=fmt(Math.abs(saldo));es.style.color=`var(--${saldo>=0?'wa':'ok'}-t)`;}
  const byTipo={};gastoRows.forEach(g=>{byTipo[g.tipo]=(byTipo[g.tipo]||0)+(parseFloat(g.importe)||0);});
  const rc=document.getElementById('rcomp');if(rc)rc.innerHTML=renderResumen(byTipo,gasAct,saldo);
}
function simScan(){
  showToast('Escaneando...','in');
  setTimeout(()=>{gastoRows.push({tipo:'Ticket / Factura C',rubro:172,detalle:'Almuerzo en ruta',importe:8500});renderGastoTable();showToast('Comprobante cargado','ok');},1000);
}
async function _enviarRend(nuevoStatus){
  if(!gastoRows.length){showToast('Cargá al menos un comprobante','wa');return;}
  const tot=total(currentSol);
  const gasAct=gastoRows.reduce((a,g)=>a+(parseFloat(g.importe)||0),0);
  const saldo=tot-gasAct;
  try {
    await api({action:'saveGastos',id:currentSol.id,gastos:JSON.stringify(gastoRows),usuario:currentSol.solicitante});
    await api({action:'updateStatus',id:currentSol.id,status:'rendido',usuario:currentSol.solicitante});
    await api({action:'sendMail',tipo:'rendicion_enviada',id:currentSol.id,
      solicitante:currentSol.solicitante,emailSolicitante:currentSol.email,
      destino:currentSol.destino,total:tot,gastado:gasAct,saldo});
    currentSol.gastos=JSON.parse(JSON.stringify(gastoRows));
    currentSol.status='rendido';currentSol.observacion='';
    updateBadges();renderRendicion();
    showToast('Rendición enviada al tesorero','ok');
  } catch(e){showToast('Error: '+e.message,'er');}
}
function enviarRendicion(){_enviarRend('rendido');}
function reenviarRendicion(){_enviarRend('rendido');}

          <div class="rr"><span style="color:var(--text2)">Hospedaje</span><span>${fmt(s.hospedaje)}</span></div>
          <div class="rr"><span style="color:var(--text2)">Reserva</span><span>${fmt(s.reserva)}</span></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn ok" onclick="aprobar(${idx})"><i class="ti ti-check"></i> Aprobar y entregar fondos</button>
          <button class="btn er" onclick="showDenegar(${idx})"><i class="ti ti-x"></i> Denegar</button>
        </div>
      </div>`;}).join('')}`:''}
    ${rend.length?`<div class="ctitle" style="margin:.5rem 0 .75rem">Rendiciones a revisar</div>
    ${rend.map(s=>{const idx=solicitudes.indexOf(s);const tot=total(s);const gas=gastado(s);const saldo=tot-gas;
      return `<div class="card" style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:.75rem">
          <div><div style="font-weight:500;font-size:15px;margin-bottom:3px">${s.destino}</div>
          <div style="font-size:12px;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span>${s.solicitante}</span><span class="idchip">${s.id}</span>
            <span>${s.fechaSalida} → ${s.fechaLlegada}</span>
          </div></div>
          <button class="btn in" style="font-size:12px;padding:5px 12px" onclick="irRendicion(${idx})"><i class="ti ti-eye"></i> Ver detalle</button>
        </div>
        <div style="display:flex;gap:1.5rem;font-size:13px;flex-wrap:wrap;margin-bottom:.75rem">
          <span>Entregado: <strong>${fmt(tot)}</strong></span>
          <span>Gastado: <strong>${fmt(gas)}</strong></span>
          <span style="font-weight:500;color:var(--${saldo>=0?'wa':'ok'}-t)">${saldo>=0?'Reintegra':'Recibe'}: ${fmt(Math.abs(saldo))}</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn ok" onclick="cerrar(${idx})"><i class="ti ti-check"></i> Aprobar y cerrar</button>
          <button class="btn wa" onclick="showObservacion(${idx})"><i class="ti ti-message-circle"></i> Observar y devolver</button>
        </div>
      </div>`;}).join('')}`:''}
    ${cerr.length?`<div class="ctitle" style="margin:.5rem 0 .75rem">Historial</div>
    ${cerr.map(s=>{const tot=total(s);const gas=gastado(s);
      return `<div class="card" style="margin-bottom:.75rem;opacity:.8">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div><div style="font-weight:500">${s.destino}</div>
          <div style="font-size:12px;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span>${s.solicitante}</span><span class="idchip">${s.id}</span>
          </div></div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:13px">${fmt(gas)} / ${fmt(tot)}</span>
            <span class="sb s-cerrado"><i class="ti ti-check"></i> Cerrado</span>
          </div>
        </div>
      </div>`;}).join('')}`:''}
    ${!pend.length&&!rend.length&&!cerr.length?`<div class="card" style="text-align:center;padding:3rem">
      <i class="ti ti-building-bank" style="font-size:48px;color:var(--text2)"></i>
      <p style="margin-top:1rem;color:var(--text2)">Sin movimientos pendientes.</p>
    </div>`:''}
  `;
}

async function aprobar(i){
  const s=solicitudes[i];const tot=total(s);
  try {
    await api({action:'updateStatus',id:s.id,status:'aprobado',usuario:'Tesorero'});
    await api({action:'sendMail',tipo:'fondos_aprobados',id:s.id,
      solicitante:s.solicitante,emailSolicitante:s.email,
      destino:s.destino,fechaSalida:s.fechaSalida,fechaLlegada:s.fechaLlegada,total:tot});
    solicitudes[i].status='aprobado';updateBadges();renderTesoreria();
    showToast('Fondos aprobados. El vendedor recibió un mail.','ok');
  } catch(e){showToast('Error: '+e.message,'er');}
}
function showDenegar(i){denegarTarget=i;document.getElementById('denegar-texto').value='';openOv('ov-denegar');}
async function confirmarDenegar(){
  const i=denegarTarget,s=solicitudes[i];
  const obs=document.getElementById('denegar-texto').value.trim();
  closeOv('ov-denegar');
  try {
    await api({action:'updateStatus',id:s.id,status:'denegado',usuario:'Tesorero',observacion:obs});
    await api({action:'sendMail',tipo:'fondos_denegados',id:s.id,
      solicitante:s.solicitante,emailSolicitante:s.email,destino:s.destino,observacion:obs});
    solicitudes[i].status='denegado';updateBadges();renderTesoreria();
    showToast('Solicitud denegada.','wa');
  } catch(e){showToast('Error: '+e.message,'er');}
}
function showObservacion(i){obsTarget=i;document.getElementById('obs-texto').value='';openOv('ov-obs');}
async function confirmarObservacion(){
  const i=obsTarget,s=solicitudes[i];
  const obs=document.getElementById('obs-texto').value.trim();
  if(!obs){showToast('Escribí la observación','wa');return;}
  closeOv('ov-obs');
  try {
    await api({action:'updateStatus',id:s.id,status:'observado',usuario:'Tesorero',observacion:obs});
    await api({action:'sendMail',tipo:'rendicion_observada',id:s.id,
      solicitante:s.solicitante,emailSolicitante:s.email,destino:s.destino,observacion:obs});
    solicitudes[i].status='observado';solicitudes[i].observacion=obs;
    updateBadges();renderTesoreria();
    showToast('Rendición devuelta con observación.','wa');
  } catch(e){showToast('Error: '+e.message,'er');}
}
async function cerrar(i){
  const s=solicitudes[i];
  try {
    await api({action:'updateStatus',id:s.id,status:'cerrado',usuario:'Tesorero'});
    solicitudes[i].status='cerrado';updateBadges();renderTesoreria();
    showToast('Rendición cerrada y archivada.','ok');
  } catch(e){showToast('Error: '+e.message,'er');}
}

// ══════════════════════════════════════════════
//  GESTIÓN DE USUARIOS
// ══════════════════════════════════════════════
async function abrirUsuarios(){
  openOv('ov-usuarios');
  document.getElementById('usuarios-lista').innerHTML='<div style="display:flex;align-items:center;gap:8px;color:var(--text2)"><div class="spin"></div> Cargando...</div>';
  try {
    const res=await api({action:'getUsuarios'});
    usuariosDB=Array.isArray(res)?res:[];
    renderUsuariosList();
  } catch(e){
    document.getElementById('usuarios-lista').innerHTML=`<p style="color:var(--er-t)">Error: ${e.message}</p>`;
  }
}

function renderUsuariosList(){
  const el=document.getElementById('usuarios-lista');
  if(!usuariosDB.length){el.innerHTML='<p style="font-size:13px;color:var(--text2)">No hay usuarios registrados.</p>';return;}
  el.innerHTML=`<table class="gt" style="font-size:13px">
    <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th></th></tr></thead>
    <tbody>${usuariosDB.map((u,i)=>`<tr>
      <td>${u.Nombre||'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${u.Email||'—'}</td>
      <td><span class="sb ${u.Rol==='tesorero'?'s-aprobado':'s-rendido'}" style="font-size:11px">${u.Rol||'vendedor'}</span></td>
      <td><span style="font-size:12px;color:${u.Activo==='NO'?'var(--er-t)':'var(--ok-t)'}">${u.Activo==='NO'?'Inactivo':'Activo'}</span></td>
      <td><button class="btn" style="padding:3px 8px;font-size:12px" onclick="toggleUsuario(${i})">${u.Activo==='NO'?'Activar':'Desactivar'}</button></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

async function agregarUsuario(){
  const nombre=document.getElementById('nu-nombre').value.trim();
  const email=document.getElementById('nu-email').value.trim().toLowerCase();
  const rol=document.getElementById('nu-rol').value;
  const clave=document.getElementById('nu-clave').value.trim()||CLAVE_DEFAULT;
  if(!nombre||!email){showToast('Completá nombre y email','wa');return;}
  try {
    await api({action:'saveUsuario',nombre,email,rol,clave,activo:'SI'});
    usuariosDB.push({Nombre:nombre,Email:email,Rol:rol,Clave:clave,Activo:'SI'});
    renderUsuariosList();
    document.getElementById('nu-nombre').value='';
    document.getElementById('nu-email').value='';
    document.getElementById('nu-clave').value=CLAVE_DEFAULT;
    showToast(`Usuario ${nombre} agregado.`,'ok');
  } catch(e){showToast('Error: '+e.message,'er');}
}

async function toggleUsuario(i){
  const u=usuariosDB[i];
  const nuevoActivo=u.Activo==='NO'?'SI':'NO';
  try {
    await api({action:'saveUsuario',nombre:u.Nombre,email:u.Email,rol:u.Rol,clave:u.Clave,activo:nuevoActivo});
    usuariosDB[i].Activo=nuevoActivo;
    renderUsuariosList();
    showToast(`Usuario ${nuevoActivo==='SI'?'activado':'desactivado'}.`,'ok');
  } catch(e){showToast('Error: '+e.message,'er');}
}

// ══════════════════════════════════════════════
//  CAMBIAR CLAVE
// ══════════════════════════════════════════════
async function guardarClave(){
  const nueva=document.getElementById('clave-nueva').value;
  const rep=document.getElementById('clave-rep').value;
  const err=document.getElementById('clave-err');
  err.textContent='';
  if(nueva.length<6){err.textContent='Mínimo 6 caracteres.';return;}
  if(nueva!==rep){err.textContent='Las contraseñas no coinciden.';return;}
  try {
    await api({action:'cambiarClave',email:USER.email,clave:nueva});
    closeOv('ov-clave');
    document.getElementById('clave-nueva').value='';
    document.getElementById('clave-rep').value='';
    showToast('Contraseña actualizada.','ok');
  } catch(e){err.textContent='Error: '+e.message;}
}

// ══════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════
function renderDashboard(){
  if(ROL!=='tesorero')return;
  const el=document.getElementById('panel-dashboard');
  const conGastos=solicitudes.filter(s=>['rendido','observado','cerrado'].includes(s.status)&&s.gastos&&s.gastos.length);
  const usuarios=[...new Set(solicitudes.map(s=>s.solicitante).filter(Boolean))].sort();
  let filtered=conGastos.filter(s=>{
    if(filterDash.usuario&&s.solicitante!==filterDash.usuario)return false;
    if(filterDash.desde&&s.fechaSalida<filterDash.desde)return false;
    if(filterDash.hasta&&s.fechaSalida>filterDash.hasta)return false;
    return true;
  });
  const te=filtered.reduce((a,s)=>a+total(s),0);
  const tg=filtered.reduce((a,s)=>a+gastado(s),0);
  const ts=te-tg;
  const porRubro={};
  filtered.forEach(s=>{(s.gastos||[]).forEach(g=>{const d=RUBROS.find(r=>r.cod===g.rubro)?.desc||'Otros';porRubro[d]=(porRubro[d]||0)+(parseFloat(g.importe)||0);});});
  const re=Object.entries(porRubro).sort((a,b)=>b[1]-a[1]);
  const tr=re.reduce((a,r)=>a+r[1],0);
  const porTipo={};
  filtered.forEach(s=>{(s.gastos||[]).forEach(g=>{porTipo[g.tipo]=(porTipo[g.tipo]||0)+(parseFloat(g.importe)||0);});});

  el.innerHTML=`
    <div class="card">
      <div class="ctitle">Filtros</div>
      <div class="fg3">
        <div class="fi"><label>Desde</label><input type="date" id="dd" value="${filterDash.desde}" onchange="filterDash.desde=this.value;renderDashboard()"></div>
        <div class="fi"><label>Hasta</label><input type="date" id="dh" value="${filterDash.hasta}" onchange="filterDash.hasta=this.value;renderDashboard()"></div>
        <div class="fi"><label>Vendedor</label>
          <select id="du" onchange="filterDash.usuario=this.value;renderDashboard()">
            <option value="">Todos</option>
            ${usuarios.map(u=>`<option${filterDash.usuario===u?' selected':''}>${u}</option>`).join('')}
          </select>
        </div>
      </div>
      ${filterDash.desde||filterDash.hasta||filterDash.usuario?`<button class="btn" style="margin-top:.5rem" onclick="filterDash={desde:'',hasta:'',usuario:''};renderDashboard()"><i class="ti ti-x"></i> Limpiar</button>`:''}
    </div>
    <div class="mrow4">
      <div class="met"><div class="ml">Giras</div><div class="mv">${filtered.length}</div></div>
      <div class="met"><div class="ml">Entregado</div><div class="mv" style="font-size:16px">${fmt(te)}</div></div>
      <div class="met"><div class="ml">Gastado</div><div class="mv" style="font-size:16px">${fmt(tg)}</div></div>
      <div class="met"><div class="ml">${ts>=0?'Reintegro':'A devolver'}</div><div class="mv" style="font-size:16px;color:var(--${ts>=0?'wa':'ok'}-t)">${fmt(Math.abs(ts))}</div></div>
    </div>
    ${!filtered.length?`<div class="card" style="text-align:center;padding:2rem"><p style="color:var(--text2)">Sin rendiciones en el período.</p></div>`:`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
      <div class="card"><div class="ctitle">Por rubro</div><canvas id="cr" height="220"></canvas></div>
      <div class="card"><div class="ctitle">Por tipo de comprobante</div><canvas id="ct" height="220"></canvas></div>
    </div>
    <div class="card">
      <div class="ctitle">Detalle por rubro</div>
      ${re.map(([r,v])=>{const pct=tr>0?Math.round(v/tr*100):0;
        return `<div class="rr"><span style="color:var(--text2);font-size:13px">${r}</span>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:100px;height:4px;background:var(--bg2);border-radius:999px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--in-t);border-radius:999px"></div></div>
            <span style="font-size:12px;color:var(--text2);min-width:28px;text-align:right">${pct}%</span>
            <strong style="min-width:86px;text-align:right">${fmt(v)}</strong>
          </div></div>`;}).join('')}
      <div class="rr rrt"><span>Total</span><span>${fmt(tr)}</span></div>
    </div>
    <div class="card">
      <div class="ctitle">Giras — clic para ver rendición</div>
      ${filtered.map(s=>{const tot=total(s),gas=gastado(s),idx=solicitudes.indexOf(s);const pct=tot>0?Math.min(100,Math.round(gas/tot*100)):0;
        return `<div style="padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer" onclick="irRendicion(${idx})">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-weight:500">${s.destino}</span>
              <span class="idchip">${s.id}</span>
              <span style="font-size:12px;color:var(--text2)">${s.solicitante} · ${s.fechaSalida}</span>
            </div>
            <div style="display:flex;gap:10px;align-items:center">
              <span style="font-size:13px">${fmt(gas)} / ${fmt(tot)}</span>
              <span class="sb s-${s.status}" style="font-size:11px">${ESTADOS[s.status]||s.status}</span>
              <i class="ti ti-chevron-right" style="color:var(--text3)"></i>
            </div>
          </div>
          <div class="pbar2"><div class="pfill" style="width:${pct}%;background:var(--${pct>=100?'er':pct>=70?'wa':'ok'}-t)"></div></div>
        </div>`;}).join('')}
    </div>`}
  `;
  if(!filtered.length)return;
  const PAL=['#378add','#1d9e75','#d85a30','#ba7517','#534ab7','#993556','#639922','#e24b4a','#185fa5','#0f6e56'];
  setTimeout(()=>{
    if(dashChart&&dashChart.length)dashChart.forEach(c=>c.destroy());
    dashChart=[];
    const cr=document.getElementById('cr'),ct=document.getElementById('ct');
    if(cr)dashChart.push(new Chart(cr,{type:'doughnut',
      data:{labels:re.map(([r])=>r),datasets:[{data:re.map(([,v])=>Math.round(v)),backgroundColor:PAL,borderWidth:2,borderColor:'transparent'}]},
      options:{plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10}}},cutout:'60%'}}));
    const te2=Object.entries(porTipo).sort((a,b)=>b[1]-a[1]);
    if(ct)dashChart.push(new Chart(ct,{type:'bar',
      data:{labels:te2.map(([t])=>t),datasets:[{data:te2.map(([,v])=>Math.round(v)),backgroundColor:PAL,borderRadius:4}]},
      options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString('es-AR'),font:{size:10}}},x:{ticks:{font:{size:10}}}}}}));
  },100);
}

// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
function openCfg(){
  document.getElementById('cfg-viat').value=CFG.viaticos;
  document.getElementById('cfg-hosp').value=CFG.hospedaje;
  document.getElementById('cfg-dias').value=CFG.diasLimite;
  openOv('ov-cfg');
}
async function guardarConfig(){
  const params={action:'saveConfig',
    viaticos:document.getElementById('cfg-viat').value,
    hospedaje:document.getElementById('cfg-hosp').value,
    diasLimite:document.getElementById('cfg-dias').value};
  try {
    await api(params);
    CFG.viaticos=parseFloat(params.viaticos)||60000;
    CFG.hospedaje=parseFloat(params.hospedaje)||100000;
    CFG.diasLimite=parseInt(params.diasLimite)||5;
    closeOv('ov-cfg');showToast('Configuración guardada.','ok');
  } catch(e){showToast('Error: '+e.message,'er');}
}

// Deep link desde mail
const urlP=new URLSearchParams(window.location.search);
if(urlP.get('autoLogin')==='1'&&urlP.get('email')&&urlP.get('tok')){
  // Token simple para deep links (validado en el script)
  api({action:'loginToken',email:urlP.get('email'),tok:urlP.get('tok')}).then(r=>{
    if(r.ok){USER={email:r.email,nombre:r.nombre,rol:r.rol};ROL=r.rol;initApp();}
  }).catch(()=>{});
}
</script>
