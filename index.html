<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fondos de Gira</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#efede6;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.25);
  --success-bg:#eaf3de;--success-text:#3b6d11;--success-border:#639922;
  --warning-bg:#faeeda;--warning-text:#854f0b;--warning-border:#ba7517;
  --danger-bg:#fcebeb;--danger-text:#a32d2d;--danger-border:#e24b4a;
  --info-bg:#e6f1fb;--info-text:#185fa5;--info-border:#378add;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#252525;--bg3:#111111;
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#666;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.25);
  --success-bg:#1a2e0a;--success-text:#97c459;--success-border:#3b6d11;
  --warning-bg:#2e1f05;--warning-text:#fac775;--warning-border:#854f0b;
  --danger-bg:#2e0a0a;--danger-text:#f09595;--danger-border:#a32d2d;
  --info-bg:#0a1e35;--info-text:#85b7eb;--info-border:#185fa5;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:920px;margin:0 auto;padding:1.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.tab-bar{display:flex;gap:4px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:4px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{flex:1;min-width:90px;padding:8px 10px;border:none;background:transparent;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;font-family:inherit}
.tab.active{background:var(--bg);color:var(--text);border:0.5px solid var(--border);font-weight:500}
.tab:hover:not(.active){background:var(--bg);color:var(--text)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.card.danger-card{border-color:var(--danger-border);background:var(--danger-bg)}
.card-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.06em}
.divider{height:0.5px;background:var(--border);margin:1rem 0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;color:var(--text2)}
input,select,textarea{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;transition:border-color .15s}
input:focus,select:focus{outline:none;border-color:var(--border2)}
.btn{padding:8px 16px;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}.btn-primary:hover{opacity:.85}
.btn-success{color:var(--success-text);border-color:var(--success-border)}.btn-success:hover{background:var(--success-bg)}
.btn-danger{color:var(--danger-text);border-color:var(--danger-border)}.btn-danger:hover{background:var(--danger-bg)}
.btn-info{color:var(--info-text);border-color:var(--info-border)}.btn-info:hover{background:var(--info-bg)}
.btn-warning{color:var(--warning-text);border-color:var(--warning-border)}.btn-warning:hover{background:var(--warning-bg)}
.sbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500}
.s-borrador{background:var(--bg2);color:var(--text2)}
.s-pendiente{background:var(--warning-bg);color:var(--warning-text)}
.s-aprobado{background:var(--info-bg);color:var(--info-text)}
.s-rendido{background:var(--success-bg);color:var(--success-text)}
.s-cerrado{background:var(--bg2);color:var(--text2)}
.s-vencido{background:var(--danger-bg);color:var(--danger-text)}
.nbadge{background:var(--danger-bg);color:var(--danger-text);border-radius:999px;font-size:11px;padding:1px 7px;font-weight:500}
.wbadge{background:var(--warning-bg);color:var(--warning-text);border-radius:999px;font-size:11px;padding:1px 7px;font-weight:500}
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.metric{background:var(--bg2);border-radius:var(--radius);padding:12px 14px}
.metric .mlabel{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric .mval{font-size:20px;font-weight:500}
.metric .msub{font-size:11px;color:var(--text2);margin-top:2px}
.timeline{display:flex;flex-direction:column}
.tl-step{display:flex;gap:12px;padding:8px 0}
.tl-dot{display:flex;flex-direction:column;align-items:center}
.tl-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;border:0.5px solid var(--border)}
.tl-line{width:1.5px;flex:1;min-height:8px;background:var(--border);margin:2px 0}
.tl-content{flex:1;padding-bottom:6px}
.tl-title{font-weight:500;font-size:13px;margin-bottom:2px}
.tl-sub{font-size:12px;color:var(--text2)}
.tl-done .tl-circle{background:var(--success-bg);color:var(--success-text);border-color:var(--success-border)}
.tl-done .tl-line{background:var(--success-border)}
.tl-active .tl-circle{background:var(--text);color:var(--bg);border-color:var(--text)}
.tl-pending .tl-circle{background:var(--bg2);color:var(--text2)}
.tl-danger .tl-circle{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border)}
table.gastos{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
table.gastos th{text-align:left;padding:8px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border)}
table.gastos td{padding:7px 8px;border-bottom:0.5px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
table.gastos tr:last-child td{border-bottom:none}
.resumen-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border)}
.resumen-row:last-child{border-bottom:none}
.resumen-total{font-weight:500;font-size:15px}
.paso-bar{display:flex;align-items:center;margin-bottom:1.5rem;overflow-x:auto}
.paso{display:flex;align-items:center;gap:6px;flex-shrink:0}
.paso-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);flex-shrink:0}
.paso-num.done{background:var(--success-bg);border-color:var(--success-border);color:var(--success-text)}
.paso-num.active{background:var(--text);border-color:var(--text);color:var(--bg)}
.paso-label{font-size:12px;color:var(--text2)}
.paso-label.active{color:var(--text);font-weight:500}
.paso-sep{width:28px;height:0.5px;background:var(--border);margin:0 4px;flex-shrink:0}
.check-list{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;user-select:none;transition:all .15s}
.check-item:hover{background:var(--bg2)}
.check-item.checked{border-color:var(--success-border);background:var(--success-bg)}
.check-item.checked span{color:var(--success-text)}
.check-item input[type=checkbox]{width:16px;height:16px;cursor:pointer}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border:0.5px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.progress-bar{height:4px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:999px;transition:width .3s}
.overlay-wrap{display:none;min-height:480px;background:rgba(0,0,0,.5);align-items:center;justify-content:center;margin:-1.5rem;padding:2rem}
.overlay-wrap.open{display:flex}
.overlay-box{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:1.5rem;width:440px;max-width:100%}
.alert-box{border:2px solid var(--danger-border)}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:10px 16px;border-radius:var(--radius);font-size:13px;display:flex;align-items:center;gap:8px;z-index:9999;max-width:300px;border:0.5px solid;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>
<div class="app" id="app">

<!-- OVERLAY ALERTA VENCIMIENTO -->
<div class="overlay-wrap" id="ov-alerta" role="alertdialog">
  <div class="overlay-box alert-box">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
      <i class="ti ti-alert-triangle" style="font-size:24px;color:var(--danger-text)"></i>
      <div>
        <div style="font-weight:500;font-size:15px;color:var(--danger-text)">Rendiciones vencidas</div>
        <div style="font-size:12px;color:var(--text2)">Más de <span id="alerta-dias">5</span> días sin rendir desde el regreso</div>
      </div>
    </div>
    <div id="alerta-lista" style="margin-bottom:1.25rem"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeOverlay('ov-alerta')">Recordar más tarde</button>
      <button class="btn btn-danger" onclick="closeOverlay('ov-alerta');showTab('seguimiento')">Ver en seguimiento</button>
    </div>
  </div>
</div>

<!-- OVERLAY CONFIGURACION -->
<div class="overlay-wrap" id="ov-config" role="dialog">
  <div class="overlay-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <div style="font-weight:500;font-size:15px"><i class="ti ti-settings"></i> Configuración</div>
      <button class="btn" onclick="closeOverlay('ov-config')" aria-label="Cerrar"><i class="ti ti-x"></i></button>
    </div>
    <div id="cfg-locked">
      <div style="text-align:center;padding:1.5rem 0">
        <i class="ti ti-lock" style="font-size:36px;color:var(--text2)"></i>
        <p style="margin:.75rem 0 .5rem;font-weight:500">Acceso restringido</p>
        <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Ingresá la clave de administración</p>
        <input type="password" id="cfg-pass" placeholder="Contraseña" style="max-width:200px;margin-bottom:10px" onkeydown="if(event.key==='Enter')checkCfgPass()">
        <br><button class="btn btn-primary" style="margin-top:8px" onclick="checkCfgPass()">Ingresar</button>
        <p style="font-size:12px;color:var(--danger-text);margin-top:8px;min-height:18px" id="cfg-err"></p>
      </div>
    </div>
    <div id="cfg-unlocked" style="display:none">
      <div class="form-group" style="margin-bottom:1rem"><label>Viáticos por día ($)</label><input type="number" id="cfg-viat" value="60000"></div>
      <div class="form-group" style="margin-bottom:1rem"><label>Hospedaje por día ($)</label><input type="number" id="cfg-hosp" value="100000"></div>
      <div class="form-group" style="margin-bottom:1rem"><label>Días límite para rendir</label><input type="number" id="cfg-dias" value="5"></div>
      <div class="form-group" style="margin-bottom:1rem"><label>Cambiar contraseña admin</label><input type="password" id="cfg-newpass" placeholder="Dejar vacío para no cambiar"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
        <button class="btn" onclick="closeOverlay('ov-config')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarConfig()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <i class="ti ti-route" style="font-size:22px"></i>
    <div style="font-size:18px;font-weight:500">Fondos de Gira</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn" onclick="openOverlay('ov-config')"><i class="ti ti-settings"></i> Configuración</button>
    <button class="btn btn-primary" onclick="nuevaSolicitud()"><i class="ti ti-plus"></i> Nueva gira</button>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar" role="tablist">
  <button class="tab active" id="t-solicitudes" onclick="showTab('solicitudes')"><i class="ti ti-list"></i> Solicitudes</button>
  <button class="tab" id="t-seguimiento" onclick="showTab('seguimiento')"><i class="ti ti-chart-gantt"></i> Seguimiento <span class="wbadge" id="badge-seg" style="display:none">0</span></button>
  <button class="tab" id="t-nueva" onclick="showTab('nueva')"><i class="ti ti-forms"></i> Formulario</button>
  <button class="tab" id="t-rendicion" onclick="showTab('rendicion')"><i class="ti ti-receipt"></i> Rendición</button>
  <button class="tab" id="t-tesoreria" onclick="showTab('tesoreria')"><i class="ti ti-building-bank"></i> Tesorería <span class="nbadge" id="badge-tes" style="display:none">0</span></button>
</div>

<!-- PANELES -->
<div id="panel-solicitudes" class="panel active"></div>
<div id="panel-seguimiento" class="panel"></div>
<div id="panel-nueva" class="panel"><div class="paso-bar" id="paso-bar"></div><div id="step-content"></div></div>
<div id="panel-rendicion" class="panel"></div>
<div id="panel-tesoreria" class="panel"></div>

<div id="toast"></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPTb41zE1Cr90JsAvpDCGrXD9OJ7Ybsmew-VCYFML9dAwS1SM9YZETZ44S68QExQumxg/exec';

const RUBROS = [
  {cod:170,desc:'Pasajes y Movilidad'},{cod:172,desc:'Viáticos y Refrigerios'},
  {cod:174,desc:'Alojamiento'},{cod:138,desc:'Combustible Rodados'},
  {cod:144,desc:'Mantenimiento Rodados'},{cod:150,desc:'Reparaciones Rodados'},
  {cod:192,desc:'Gastos Varios'},{cod:166,desc:'Seguros'},
  {cod:180,desc:'Teléfono e Internet'},{cod:272,desc:'CI-Viáticos'},
  {cod:274,desc:'CI-Alojamiento'},{cod:270,desc:'CI-Pasajes'},
  {cod:292,desc:'CI-Gastos Varios'},{cod:370,desc:'LE-Viáticos'},
  {cod:372,desc:'LE-Alojamiento'},{cod:368,desc:'LE-Pasajes'},{cod:388,desc:'LE-Gastos Varios'}
];
const TIPOS_COMP = ['Factura A','Factura B','Ticket / Factura C','Recibo','Comprobante electrónico','Otro'];
const TRANSPORTES = ['Vehículo empresa','Vehículo propio','Colectivo','Avión'];
const CHECKS_VEH = ['Seguro vigente','RTO al día','Autorización de manejo','Estado general del vehículo OK','Tarjeta YPF en ruta'];
const ESTADOS = {borrador:'Borrador',pendiente:'Pendiente aprobación',aprobado:'En gira',rendido:'Rendición enviada',cerrado:'Cerrado'};

let CFG = {viaticos:60000,hospedaje:100000,diasLimite:5,passAdmin:'admin1234'};
let solicitudes = [];
let currentSol = null;
let currentStep = 1;
let gastoRows = [];
let filterSeg = 'todos';

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

async function api(params) {
  const url = APPS_SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

async function cargarDatos() {
  document.getElementById('panel-solicitudes').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:3rem;color:var(--text2)"><div style="width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite"></div> Cargando datos...</div>';
  const style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);
  try {
    const [sols, cfgData] = await Promise.all([
      api({action:'getSolicitudes'}),
      api({action:'getConfig'})
    ]);
    solicitudes = Array.isArray(sols) ? sols.map(s => ({
      id: s.ID, status: s.Status || 'borrador',
      solicitante: s.Solicitante || '', jefe: s.Jefe || '',
      destino: s.Destino || '', fechaSalida: s.FechaSalida || '',
      fechaLlegada: s.FechaLlegada || '', dias: parseInt(s.Dias)||0,
      viaticos: parseFloat(s.Viaticos)||0, hospedaje: parseFloat(s.Hospedaje)||0,
      reserva: parseFloat(s.Reserva)||0, transporte: s.Transporte || '',
      checks: Array.isArray(s.Checks) ? s.Checks : [],
      gastos: []
    })) : [];
    if (cfgData && !cfgData.error) {
      CFG.viaticos   = parseFloat(cfgData.viaticos)  || 60000;
      CFG.hospedaje  = parseFloat(cfgData.hospedaje) || 100000;
      CFG.diasLimite = parseInt(cfgData.diasLimite)  || 5;
      CFG.passAdmin  = cfgData.passAdmin              || 'admin1234';
    }
    for (const s of solicitudes.filter(x => ['aprobado','rendido','cerrado'].includes(x.status))) {
      try {
        const g = await api({action:'getGastos', id: s.id});
        s.gastos = Array.isArray(g) ? g.map(row => ({
          tipo: row.tipo, rubro: parseInt(row.rubro)||172,
          detalle: row.detalle, importe: parseFloat(row.importe)||0
        })) : [];
      } catch(e) { s.gastos = []; }
    }
  } catch(e) {
    showToast('Error al conectar. Verificá la conexión.', 'danger');
  }
  updateBadges();
  renderSolicitudes();
  setTimeout(checkVencimientos, 800);
}

function fmt(n){return '$'+Math.round(n||0).toLocaleString('es-AR')}

function diasDesde(fecha) {
  if (!fecha) return null;
  const d = new Date(fecha); d.setHours(0,0,0,0);
  return Math.floor((TODAY - d) / 86400000);
}

function estaVencida(s) {
  if (s.status !== 'aprobado') return false;
  const d = diasDesde(s.fechaLlegada);
  return d !== null && d > CFG.diasLimite;
}

function diasRestantes(s) {
  if (s.status !== 'aprobado' || !s.fechaLlegada) return null;
  return CFG.diasLimite - (diasDesde(s.fechaLlegada) || 0);
}

function updateBadges() {
  const tes = solicitudes.filter(s => s.status==='pendiente'||s.status==='rendido').length;
  const seg = solicitudes.filter(s => estaVencida(s)).length;
  const bt = document.getElementById('badge-tes');
  const bs = document.getElementById('badge-seg');
  bt.textContent = tes; bt.style.display = tes ? '' : 'none';
  bs.textContent = seg; bs.style.display = seg ? '' : 'none';
}

function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  const map = {
    success:['var(--success-bg)','var(--success-text)','var(--success-border)','ti-check'],
    warning:['var(--warning-bg)','var(--warning-text)','var(--warning-border)','ti-alert-triangle'],
    danger: ['var(--danger-bg)', 'var(--danger-text)', 'var(--danger-border)', 'ti-alert-circle'],
    info:   ['var(--info-bg)',   'var(--info-text)',   'var(--info-border)',   'ti-info-circle'],
  };
  const [bg,c,b,ic] = map[type]||map.info;
  t.style.background=bg; t.style.color=c; t.style.borderColor=b; t.style.opacity='1';
  t.innerHTML = `<i class="ti ${ic}"></i>${msg}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.opacity='0', 3500);
}

function showTab(name) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('t-'+name).classList.add('active');
  if (name==='solicitudes') renderSolicitudes();
  if (name==='seguimiento') renderSeguimiento();
  if (name==='tesoreria')   renderTesoreria();
  if (name==='rendicion')   renderRendicion();
}

function checkVencimientos() {
  const vencidas = solicitudes.filter(s=>estaVencida(s));
  if (!vencidas.length) return;
  document.getElementById('alerta-dias').textContent = CFG.diasLimite;
  document.getElementById('alerta-lista').innerHTML = vencidas.map(s=>{
    const dias = diasDesde(s.fechaLlegada);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:0.5px solid var(--danger-border);border-radius:var(--radius);margin-bottom:8px;background:var(--bg)">
      <div>
        <div style="font-weight:500;font-size:13px">${s.destino}</div>
        <div style="font-size:12px;color:var(--text2)">${s.solicitante} · Regresó el ${s.fechaLlegada}</div>
      </div>
      <div style="font-weight:500;font-size:13px;color:var(--danger-text)">${dias} días</div>
    </div>`;
  }).join('');
  openOverlay('ov-alerta');
}

function renderSolicitudes() {
  const el = document.getElementById('panel-solicitudes');
  if (!solicitudes.length) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:3rem">
      <i class="ti ti-route" style="font-size:48px;color:var(--text2)"></i>
      <p style="margin-top:1rem;color:var(--text2)">No hay giras registradas.</p>
      <button class="btn btn-primary" style="margin-top:1rem" onclick="nuevaSolicitud()"><i class="ti ti-plus"></i> Nueva gira</button>
    </div>`; return;
  }
  el.innerHTML = solicitudes.map((s,i)=>{
    const total = (s.viaticos||0)+(s.hospedaje||0)+(s.reserva||0);
    const gastado = (s.gastos||[]).reduce((a,g)=>a+(parseFloat(g.importe)||0),0);
    const venc = estaVencida(s);
    const dr = diasRestantes(s);
    return `<div class="card${venc?' danger-card':''}" style="margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:.75rem">
        <div>
          <div style="font-weight:500;font-size:15px;margin-bottom:3px">${s.destino||'Sin destino'}</div>
          <div style="font-size:12px;color:var(--text2)">${s.solicitante||'—'} · ${s.fechaSalida||'?'} → ${s.fechaLlegada||'?'} · ${s.dias||0} días · <i class="ti ti-car" style="font-size:12px"></i> ${s.transporte||'—'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="sbadge s-${venc?'vencido':s.status}">${venc?'<i class="ti ti-alert-triangle"></i> Vencida':ESTADOS[s.status]||s.status}</span>
          ${s.status==='borrador'?`<button class="btn btn-info" onclick="editarSol(${i})"><i class="ti ti-edit"></i> Editar</button>`:''}
          ${s.status==='aprobado'?`<button class="btn btn-primary" onclick="irRendicion(${i})"><i class="ti ti-receipt"></i> Rendir</button>`:''}
          ${s.status==='rendido'||s.status==='cerrado'?`<button class="btn" onclick="irRendicion(${i})"><i class="ti ti-eye"></i> Ver</button>`:''}
          ${s.status!=='borrador'?`<button class="btn" onclick="verSeguimientoSol(${i})" title="Ver circuito"><i class="ti ti-chart-gantt"></i></button>`:''}
        </div>
      </div>
      ${venc?`<div style="font-size:12px;font-weight:500;color:var(--danger-text);margin-bottom:.75rem"><i class="ti ti-clock"></i> ${diasDesde(s.fechaLlegada)} días desde el regreso — pendiente de rendición</div>`:''}
      ${s.status==='aprobado'&&dr!==null&&!venc?`<div style="font-size:12px;color:var(--warning-text);margin-bottom:.75rem"><i class="ti ti-clock"></i> ${dr>0?`${dr} día${dr!==1?'s':''} para rendir`:'Vence hoy'}</div>`:''}
      <div style="display:flex;gap:1.5rem;font-size:13px;flex-wrap:wrap">
        <span><i class="ti ti-coin"></i> Entregado: <strong>${fmt(total)}</strong></span>
        ${s.status!=='borrador'&&s.status!=='pendiente'?`<span><i class="ti ti-receipt"></i> Gastado: <strong>${fmt(gastado)}</strong></span>`:''}
      </div>
    </div>`;
  }).join('');
  updateBadges();
}

function renderSeguimiento() {
  const el = document.getElementById('panel-seguimiento');
  const todo = solicitudes.filter(s=>s.status!=='borrador');
  const groups = {
    todos: todo,
    activas: todo.filter(s=>s.status==='pendiente'||s.status==='aprobado'),
    vencidas: todo.filter(s=>estaVencida(s)),
    rendidas: todo.filter(s=>s.status==='rendido'),
    cerradas: todo.filter(s=>s.status==='cerrado')
  };
  const filtered = groups[filterSeg]||todo;
  el.innerHTML = `
    <div class="filter-bar">
      ${Object.entries({todos:'Todas',activas:'En curso',vencidas:'Vencidas',rendidas:'Rendidas',cerradas:'Cerradas'}).map(([k,l])=>
        `<button class="filter-btn${filterSeg===k?' active':''}" onclick="filterSeg='${k}';renderSeguimiento()">
          ${k==='vencidas'&&groups.vencidas.length?`<i class="ti ti-alert-triangle"></i> ${l} (${groups.vencidas.length})`:l}
        </button>`).join('')}
    </div>
    ${!filtered.length?'<div class="card" style="text-align:center;padding:2rem"><p style="color:var(--text2)">No hay giras en esta categoría.</p></div>':''}
    ${filtered.map(s=>renderCardSeg(s,solicitudes.indexOf(s))).join('')}
  `;
}

function renderCardSeg(s, idx) {
  const total = (s.viaticos||0)+(s.hospedaje||0)+(s.reserva||0);
  const gastado = (s.gastos||[]).reduce((a,g)=>a+(parseFloat(g.importe)||0),0);
  const pct = total>0?Math.min(100,Math.round(gastado/total*100)):0;
  const venc = estaVencida(s);
  const dr = diasRestantes(s);
  const dias = diasDesde(s.fechaLlegada);
  const steps = [
    {label:'Solicitud creada',      sub:s.fechaSalida?`Salida: ${s.fechaSalida}`:'',                                         done:true,  active:false, danger:false},
    {label:'Aprobación tesorero',   sub:s.status==='pendiente'?'Esperando aprobación':'Aprobado',                            done:s.status!=='pendiente'&&s.status!=='borrador', active:s.status==='pendiente', danger:false},
    {label:'Fondos entregados',     sub:total?fmt(total):'—',                                                                done:['aprobado','rendido','cerrado'].includes(s.status), active:false, danger:false},
    {label:'Rendición del usuario', sub:s.status==='aprobado'?(venc?`${dias} días sin rendir`:dr!==null?`${dr>0?dr+' días para rendir':'Vence hoy'}`:'En curso'):['rendido','cerrado'].includes(s.status)?`${(s.gastos||[]).length} comprobantes · ${fmt(gastado)}`:'Pendiente',
                                                                                                                             done:['rendido','cerrado'].includes(s.status), active:s.status==='aprobado'&&!venc, danger:venc&&s.status==='aprobado'},
    {label:'Cierre por tesorero',   sub:s.status==='cerrado'?'Archivado':'Pendiente revisión',                              done:s.status==='cerrado', active:s.status==='rendido', danger:false},
  ];
  return `<div class="card${venc?' danger-card':''}" style="margin-bottom:1rem">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
      <div>
        <div style="font-weight:500;font-size:15px;margin-bottom:3px">${s.destino||'—'}</div>
        <div style="font-size:12px;color:var(--text2)">${s.solicitante} · ${s.fechaSalida||'?'} → ${s.fechaLlegada||'?'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="sbadge s-${venc?'vencido':s.status}">${venc?'<i class="ti ti-alert-triangle"></i> Vencida':ESTADOS[s.status]||s.status}</span>
        ${s.status==='aprobado'?`<button class="btn btn-info" style="padding:5px 12px;font-size:12px" onclick="irRendicion(${idx})"><i class="ti ti-receipt"></i> Ver rendición</button>`:''}
        ${s.status==='rendido'||s.status==='cerrado'?`<button class="btn" style="padding:5px 12px;font-size:12px" onclick="irRendicion(${idx})"><i class="ti ti-eye"></i> Ver</button>`:''}
      </div>
    </div>
    <div class="timeline">
      ${steps.map((st,si)=>`
        <div class="tl-step ${st.done?'tl-done':st.danger?'tl-danger':st.active?'tl-active':'tl-pending'}">
          <div class="tl-dot">
            <div class="tl-circle">${st.done?'<i class="ti ti-check"></i>':st.danger?'<i class="ti ti-alert-triangle"></i>':si+1}</div>
            ${si<steps.length-1?'<div class="tl-line"></div>':''}
          </div>
          <div class="tl-content">
            <div class="tl-title">${st.label}</div>
            <div class="tl-sub">${st.sub}</div>
          </div>
        </div>`).join('')}
    </div>
    ${['aprobado','rendido','cerrado'].includes(s.status)?`
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-size:12px;color:var(--text2)">Avance de gastos</div>
        <div style="font-size:12px;font-weight:500">${fmt(gastado)} / ${fmt(total)} (${pct}%)</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--${pct>=100?'danger':pct>=70?'warning':'success'}-text)"></div></div>
    `:''}
  </div>`;
}

function verSeguimientoSol(idx) {
  filterSeg = 'todos';
  showTab('seguimiento');
  const el = document.getElementById('panel-seguimiento');
  el.innerHTML = `<button class="btn" onclick="renderSeguimiento()" style="margin-bottom:1rem"><i class="ti ti-arrow-left"></i> Volver</button>
    ${renderCardSeg(solicitudes[idx],idx)}`;
}

function nuevaSolicitud() {
  currentSol = {id:Date.now().toString(),status:'borrador',solicitante:'',jefe:'',destino:'',fechaSalida:'',fechaLlegada:'',dias:0,viaticos:0,hospedaje:0,reserva:0,transporte:TRANSPORTES[0],checks:[],gastos:[]};
  currentStep=1; gastoRows=[];
  showTab('nueva');
  renderStep();
}

function editarSol(i) {
  currentSol = JSON.parse(JSON.stringify(solicitudes[i]));
  solicitudes.splice(i,1);
  currentStep=1; gastoRows=currentSol.gastos||[];
  showTab('nueva');
  renderStep();
}

function renderStep() {
  const pb = document.getElementById('paso-bar');
  const labels = ['Datos','Fondos','Transporte','Confirmar'];
  pb.innerHTML = labels.map((l,i)=>{
    const n=i+1,done=n<currentStep,active=n===currentStep;
    return `<div class="paso">
      <div class="paso-num${done?' done':active?' active':''}">${done?'<i class="ti ti-check"></i>':n}</div>
      <div class="paso-label${active?' active':''}">${l}</div>
    </div>${i<labels.length-1?'<div class="paso-sep"></div>':''}`;
  }).join('');
  const sc = document.getElementById('step-content');
  if (currentStep===1) {
    sc.innerHTML = `<div class="card"><div class="card-title">Datos generales</div>
      <div class="form-grid">
        <div class="form-group"><label>Solicitante</label><input id="f-sol" value="${currentSol.solicitante}" placeholder="Nombre del vendedor"></div>
        <div class="form-group"><label>Autorizante</label><input id="f-jefe" value="${currentSol.jefe}" placeholder="Nombre del autorizante"></div>
        <div class="form-group full"><label>Destino / Motivo</label><input id="f-dest" value="${currentSol.destino}" placeholder="Ej: Mendoza — reunión clientes zona cuyo"></div>
        <div class="form-group"><label>Fecha de salida</label><input type="date" id="f-sal" value="${currentSol.fechaSalida}" onchange="calcDias()"></div>
        <div class="form-group"><label>Fecha de regreso</label><input type="date" id="f-lleg" value="${currentSol.fechaLlegada}" onchange="calcDias()"></div>
      </div>
      <div style="margin-top:.75rem;font-size:13px;color:var(--text2)" id="dias-info">${currentSol.dias?`<strong>${currentSol.dias} días</strong>`:'Seleccioná las fechas.'}</div>
    </div>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="nextStep()">Siguiente <i class="ti ti-arrow-right"></i></button></div>`;
  } else if (currentStep===2) {
    const d=currentSol.dias||1;
    const v=currentSol.viaticos||(CFG.viaticos*d);
    const h=currentSol.hospedaje||(CFG.hospedaje*d);
    const r=currentSol.reserva||0;
    sc.innerHTML = `<div class="card"><div class="card-title">Fondos solicitados</div>
      <div style="font-size:12px;color:var(--info-text);background:var(--info-bg);border:0.5px solid var(--info-border);border-radius:var(--radius);padding:8px 12px;margin-bottom:1rem">
        <i class="ti ti-info-circle"></i> Tarifas: Viáticos ${fmt(CFG.viaticos)}/día · Hospedaje ${fmt(CFG.hospedaje)}/día
      </div>
      <div class="metric-row">
        <div class="metric"><div class="mlabel">Duración</div><div class="mval">${d}</div><div class="msub">días</div></div>
        <div class="metric"><div class="mlabel">Viáticos calculados</div><div class="mval">${fmt(v)}</div></div>
        <div class="metric"><div class="mlabel">Hospedaje calculado</div><div class="mval">${fmt(h)}</div></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>Viáticos ($) — editable</label><input type="number" id="f-viat" value="${v}" oninput="updTotal()"></div>
        <div class="form-group"><label>Hospedaje ($) — editable</label><input type="number" id="f-hosp" value="${h}" oninput="updTotal()"></div>
        <div class="form-group"><label>Fondo reserva ($) — manual</label><input type="number" id="f-res" value="${r}" placeholder="Redondeo / imprevisto" oninput="updTotal()"></div>
        <div class="metric" style="display:flex;flex-direction:column;justify-content:center">
          <div class="mlabel">Total a entregar</div><div class="mval" id="m-total">${fmt(v+h+r)}</div>
        </div>
      </div></div>
      <div style="display:flex;justify-content:space-between">
        <button class="btn" onclick="prevStep()"><i class="ti ti-arrow-left"></i> Atrás</button>
        <button class="btn btn-primary" onclick="nextStep()">Siguiente <i class="ti ti-arrow-right"></i></button>
      </div>`;
  } else if (currentStep===3) {
    sc.innerHTML = `<div class="card"><div class="card-title">Transporte</div>
      <div class="form-group" style="margin-bottom:1.25rem"><label>Tipo de transporte</label>
        <select id="f-trans" onchange="toggleChecks()">${TRANSPORTES.map(t=>`<option${currentSol.transporte===t?' selected':''}>${t}</option>`).join('')}</select>
      </div>
      <div id="checks-container"></div></div>
      <div style="display:flex;justify-content:space-between">
        <button class="btn" onclick="prevStep()"><i class="ti ti-arrow-left"></i> Atrás</button>
        <button class="btn btn-primary" onclick="nextStep()">Siguiente <i class="ti ti-arrow-right"></i></button>
      </div>`;
    toggleChecks();
  } else if (currentStep===4) {
    const total=(currentSol.viaticos||0)+(currentSol.hospedaje||0)+(currentSol.reserva||0);
    const ok=currentSol.solicitante&&currentSol.destino;
    sc.innerHTML = `<div class="card"><div class="card-title">Confirmación</div>
      <div class="resumen-row"><span style="color:var(--text2)">Solicitante</span><strong>${currentSol.solicitante||'—'}</strong></div>
      <div class="resumen-row"><span style="color:var(--text2)">Autorizante</span><strong>${currentSol.jefe||'—'}</strong></div>
      <div class="resumen-row"><span style="color:var(--text2)">Destino</span><strong>${currentSol.destino||'—'}</strong></div>
      <div class="resumen-row"><span style="color:var(--text2)">Período</span><strong>${currentSol.fechaSalida} → ${currentSol.fechaLlegada} (${currentSol.dias} días)</strong></div>
      <div class="resumen-row"><span style="color:var(--text2)">Viáticos</span><strong>${fmt(currentSol.viaticos)}</strong></div>
      <div class="resumen-row"><span style="color:var(--text2)">Hospedaje</span><strong>${fmt(currentSol.hospedaje)}</strong></div>
      <div class="resumen-row"><span style="color:var(--text2)">Reserva</span><strong>${fmt(currentSol.reserva)}</strong></div>
      <div class="resumen-row resumen-total"><span>Total a recibir</span><span>${fmt(total)}</span></div>
      <div class="resumen-row"><span style="color:var(--text2)">Transporte</span><strong>${currentSol.transporte}</strong></div>
      ${currentSol.checks&&currentSol.checks.length?`<div class="resumen-row"><span style="color:var(--text2)">Verificaciones</span><strong style="color:var(--success-text)">${currentSol.checks.length}/${CHECKS_VEH.length} ítems OK</strong></div>`:''}
    </div>
    ${!ok?`<div style="font-size:13px;color:var(--danger-text);background:var(--danger-bg);border:0.5px solid var(--danger-border);border-radius:var(--radius);padding:8px 12px;margin-bottom:1rem"><i class="ti ti-alert-triangle"></i> Completá el solicitante y destino.</div>`:''}
    <div style="display:flex;justify-content:space-between">
      <button class="btn" onclick="prevStep()"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" onclick="enviarSolicitud()" ${!ok?'disabled':''}>
        <i class="ti ti-send"></i> Enviar al tesorero
      </button>
    </div>`;
  }
}

function calcDias() {
  const s=document.getElementById('f-sal').value;
  const l=document.getElementById('f-lleg').value;
  if (s&&l) {
    const d=Math.max(1,Math.round((new Date(l)-new Date(s))/86400000)+1);
    document.getElementById('dias-info').innerHTML=`<strong>${d} días</strong> de gira`;
    currentSol.diasTemp=d;
  }
}
function updTotal() {
  const v=parseFloat(document.getElementById('f-viat').value)||0;
  const h=parseFloat(document.getElementById('f-hosp').value)||0;
  const r=parseFloat(document.getElementById('f-res').value)||0;
  document.getElementById('m-total').textContent=fmt(v+h+r);
}
function toggleChecks() {
  const trans=document.getElementById('f-trans').value;
  const isVeh=trans==='Vehículo empresa'||trans==='Vehículo propio';
  const el=document.getElementById('checks-container');
  if (!isVeh){el.innerHTML=`<p style="font-size:13px;color:var(--text2);padding:8px 0"><i class="ti ti-info-circle"></i> Sin verificaciones requeridas para este transporte.</p>`;return;}
  const saved=currentSol.checks||[];
  el.innerHTML=`<div class="card-title">Verificación del vehículo</div><div class="check-list" style="margin-top:.5rem">
    ${CHECKS_VEH.map((c,i)=>`<label class="check-item${saved.includes(c)?' checked':''}" id="ci-${i}">
      <input type="checkbox" ${saved.includes(c)?'checked':''} onchange="toggleCheck(this,'${c}',${i})"><span>${c}</span>
    </label>`).join('')}</div>`;
}
function toggleCheck(el,val,i) {
  if (!currentSol.checks) currentSol.checks=[];
  if (el.checked){if (!currentSol.checks.includes(val))currentSol.checks.push(val);}
  else{currentSol.checks=currentSol.checks.filter(x=>x!==val);}
  document.getElementById('ci-'+i).classList.toggle('checked',el.checked);
}
function nextStep() {
  if (currentStep===1){
    currentSol.solicitante=document.getElementById('f-sol').value.trim();
    currentSol.jefe=document.getElementById('f-jefe').value.trim();
    currentSol.destino=document.getElementById('f-dest').value.trim();
    currentSol.fechaSalida=document.getElementById('f-sal').value;
    currentSol.fechaLlegada=document.getElementById('f-lleg').value;
    const fs=currentSol.fechaSalida,fl=currentSol.fechaLlegada;
    currentSol.dias=fs&&fl?Math.max(1,Math.round((new Date(fl)-new Date(fs))/86400000)+1):1;
  } else if (currentStep===2){
    currentSol.viaticos=parseFloat(document.getElementById('f-viat').value)||0;
    currentSol.hospedaje=parseFloat(document.getElementById('f-hosp').value)||0;
    currentSol.reserva=parseFloat(document.getElementById('f-res').value)||0;
  } else if (currentStep===3){
    currentSol.transporte=document.getElementById('f-trans').value;
  }
  if (currentStep<4) currentStep++;
  renderStep();
}
function prevStep(){if(currentStep>1)currentStep--;renderStep();}

async function enviarSolicitud() {
  currentSol.status='pendiente';
  const btn=event.currentTarget;
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader"></i> Enviando...';
  try {
    await api({
      action:'saveSolicitud', id:currentSol.id,
      solicitante:currentSol.solicitante, jefe:currentSol.jefe,
      destino:currentSol.destino, fechaSalida:currentSol.fechaSalida,
      fechaLlegada:currentSol.fechaLlegada, dias:currentSol.dias,
      viaticos:currentSol.viaticos, hospedaje:currentSol.hospedaje,
      reserva:currentSol.reserva, transporte:currentSol.transporte,
      checks:JSON.stringify(currentSol.checks||[]), status:'pendiente'
    });
    solicitudes.push(currentSol);
    updateBadges(); showTab('solicitudes');
    showToast('Solicitud enviada al tesorero','success');
  } catch(e) {
    showToast('Error al guardar. Verificá la conexión.','danger');
    btn.disabled=false; btn.innerHTML='<i class="ti ti-send"></i> Enviar al tesorero';
  }
}

function irRendicion(idx) {
  currentSol=solicitudes[idx];
  gastoRows=currentSol.gastos?JSON.parse(JSON.stringify(currentSol.gastos)):[];
  showTab('rendicion');
}

function renderRendicion() {
  const el=document.getElementById('panel-rendicion');
  if (!currentSol){
    el.innerHTML=`<div class="card" style="text-align:center;padding:3rem"><p style="color:var(--text2)">Seleccioná una gira desde Solicitudes.</p></div>`;return;
  }
  const total=(currentSol.viaticos||0)+(currentSol.hospedaje||0)+(currentSol.reserva||0);
  const gastado=(gastoRows||[]).reduce((a,g)=>a+(parseFloat(g.importe)||0),0);
  const saldo=total-gastado;
  const ro=currentSol.status==='rendido'||currentSol.status==='cerrado';
  const byTipo={};
  gastoRows.forEach(g=>{byTipo[g.tipo]=(byTipo[g.tipo]||0)+(parseFloat(g.importe)||0);});
  el.innerHTML=`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
        <div>
          <div style="font-weight:500;font-size:15px">${currentSol.destino}</div>
          <div style="font-size:12px;color:var(--text2)">${currentSol.solicitante} · ${currentSol.fechaSalida} → ${currentSol.fechaLlegada}</div>
        </div>
        <span class="sbadge s-${currentSol.status}">${ESTADOS[currentSol.status]||currentSol.status}</span>
      </div>
      <div class="metric-row">
        <div class="metric"><div class="mlabel">Fondos recibidos</div><div class="mval">${fmt(total)}</div></div>
        <div class="metric"><div class="mlabel">Gastado</div><div class="mval" id="rm-g">${fmt(gastado)}</div></div>
        <div class="metric"><div class="mlabel">${saldo>=0?'A reintegrar':'A recibir'}</div>
          <div class="mval" id="rm-s" style="color:var(--${saldo>=0?'warning':'success'}-text)">${fmt(Math.abs(saldo))}</div></div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div class="card-title" style="margin-bottom:0">Comprobantes</div>
        ${!ro?`<div style="display:flex;gap:8px">
          <button class="btn" onclick="simScan()"><i class="ti ti-camera"></i> Escanear</button>
          <button class="btn btn-info" onclick="addGasto()"><i class="ti ti-plus"></i> Agregar</button>
        </div>`:''}
      </div>
      <div id="gt"></div>
    </div>
    <div class="card">
      <div class="card-title">Resumen por tipo de comprobante</div>
      <div id="rcomp">${renderResumenComp(byTipo,gastado,saldo)}</div>
    </div>
    ${!ro?`<div style="display:flex;justify-content:flex-end">
      <button class="btn btn-primary" onclick="enviarRendicion()"><i class="ti ti-send"></i> Enviar rendición al tesorero</button>
    </div>`:`<div style="font-size:13px;color:var(--success-text);background:var(--success-bg);border:0.5px solid var(--success-border);border-radius:var(--radius);padding:10px 14px">
      <i class="ti ti-check"></i> Rendición ${currentSol.status==='cerrado'?'cerrada y archivada':'enviada — pendiente de revisión'}.
    </div>`}
  `;
  renderGastoTable();
}

function renderResumenComp(byTipo,gastado,saldo) {
  if (!Object.keys(byTipo).length) return '<p style="font-size:13px;color:var(--text2)">Sin gastos cargados.</p>';
  return Object.entries(byTipo).map(([t,v])=>`<div class="resumen-row"><span style="color:var(--text2)">${t}</span><strong>${fmt(v)}</strong></div>`).join('')
    +`<div class="resumen-row resumen-total"><span>Total gastado</span><span>${fmt(gastado)}</span></div>
    <div class="resumen-row"><span style="color:var(--text2)">${saldo>=0?'A reintegrar al tesorero':'El tesorero debe abonar'}</span>
    <span style="font-weight:500;color:var(--${saldo>=0?'warning':'success'}-text)">${fmt(Math.abs(saldo))}</span></div>`;
}

function addGasto(){gastoRows.push({tipo:'Factura B',rubro:172,detalle:'',importe:0});renderGastoTable();}
function removeGasto(i){gastoRows.splice(i,1);renderGastoTable();}

function renderGastoTable() {
  const el=document.getElementById('gt');
  const ro=currentSol.status==='rendido'||currentSol.status==='cerrado';
  if (!gastoRows.length){el.innerHTML=`<p style="font-size:13px;color:var(--text2);text-align:center;padding:1rem">Sin comprobantes.</p>`;updRendTotals();return;}
  if (ro){
    el.innerHTML=`<table class="gastos"><colgroup><col style="width:26%"><col style="width:30%"><col style="width:28%"><col style="width:16%"></colgroup>
      <thead><tr><th>Tipo</th><th>Rubro</th><th>Detalle</th><th style="text-align:right">Importe</th></tr></thead>
      <tbody>${gastoRows.map(g=>`<tr><td>${g.tipo}</td><td style="font-size:12px;color:var(--text2)">${RUBROS.find(r=>r.cod===g.rubro)?.desc||g.rubro}</td><td>${g.detalle}</td><td style="text-align:right">${fmt(g.importe)}</td></tr>`).join('')}</tbody>
    </table>`;
  } else {
    el.innerHTML=`<table class="gastos"><colgroup><col style="width:21%"><col style="width:27%"><col style="width:24%"><col style="width:16%"><col style="width:12%"></colgroup>
      <thead><tr><th>Tipo</th><th>Rubro</th><th>Detalle</th><th>Importe</th><th></th></tr></thead>
      <tbody>${gastoRows.map((g,i)=>`<tr>
        <td><select style="font-size:12px;padding:3px 5px" onchange="gastoRows[${i}].tipo=this.value;updRendTotals()">${TIPOS_COMP.map(t=>`<option${g.tipo===t?' selected':''}>${t}</option>`).join('')}</select></td>
        <td><select style="font-size:12px;padding:3px 5px" onchange="gastoRows[${i}].rubro=parseInt(this.value);updRendTotals()">${RUBROS.map(r=>`<option value="${r.cod}"${g.rubro===r.cod?' selected':''}>${r.desc}</option>`).join('')}</select></td>
        <td><input style="font-size:12px;padding:3px 6px" value="${g.detalle}" placeholder="Descripción" oninput="gastoRows[${i}].detalle=this.value"></td>
        <td><input type="number" style="font-size:12px;padding:3px 6px" value="${g.importe||''}" placeholder="0" oninput="gastoRows[${i}].importe=parseFloat(this.value)||0;updRendTotals()"></td>
        <td><button class="btn btn-danger" style="padding:3px 8px" onclick="removeGasto(${i})" aria-label="Eliminar"><i class="ti ti-trash"></i></button></td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  updRendTotals();
}

function updRendTotals() {
  const total=(currentSol.viaticos||0)+(currentSol.hospedaje||0)+(currentSol.reserva||0);
  const gastado=gastoRows.reduce((a,g)=>a+(parseFloat(g.importe)||0),0);
  const saldo=total-gastado;
  const eg=document.getElementById('rm-g');const es=document.getElementById('rm-s');
  if (eg) eg.textContent=fmt(gastado);
  if (es){es.textContent=fmt(Math.abs(saldo));es.style.color=`var(--${saldo>=0?'warning':'success'}-text)`;}
  const byTipo={};gastoRows.forEach(g=>{byTipo[g.tipo]=(byTipo[g.tipo]||0)+(parseFloat(g.importe)||0);});
  const rc=document.getElementById('rcomp');
  if (rc) rc.innerHTML=renderResumenComp(byTipo,gastado,saldo);
}

function simScan() {
  showToast('Escaneando comprobante...','info');
  setTimeout(()=>{gastoRows.push({tipo:'Ticket / Factura C',rubro:172,detalle:'Almuerzo en ruta',importe:8500});renderGastoTable();showToast('Comprobante cargado','success');},1000);
}

async function enviarRendicion() {
  if (!gastoRows.length){showToast('Cargá al menos un comprobante','warning');return;}
  try {
    await api({action:'saveGastos',id:currentSol.id,gastos:JSON.stringify(gastoRows),usuario:currentSol.solicitante});
    await api({action:'updateStatus',id:currentSol.id,status:'rendido',usuario:currentSol.solicitante});
    currentSol.gastos=JSON.parse(JSON.stringify(gastoRows));
    currentSol.status='rendido';
    updateBadges();renderRendicion();
    showToast('Rendición enviada al tesorero','success');
  } catch(e){showToast('Error al guardar. Verificá la conexión.','danger');}
}

function renderTesoreria() {
  updateBadges();
  const el=document.getElementById('panel-tesoreria');
  const pend=solicitudes.filter(s=>s.status==='pendiente');
  const rend=solicitudes.filter(s=>s.status==='rendido');
  const cerr=solicitudes.filter(s=>s.status==='cerrado');
  el.innerHTML=`
    ${pend.length?`<div class="card-title" style="margin-bottom:.75rem">Solicitudes pendientes de aprobación</div>
    ${pend.map(s=>{const idx=solicitudes.indexOf(s);const total=(s.viaticos||0)+(s.hospedaje||0)+(s.reserva||0);
      return `<div class="card" style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
          <div><div style="font-weight:500;font-size:15px">${s.destino}</div>
          <div style="font-size:12px;color:var(--text2)">${s.solicitante} · ${s.dias} días · ${s.transporte}</div></div>
          <div style="font-size:18px;font-weight:500">${fmt(total)}</div>
        </div><div class="divider"></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-success" onclick="aprobar(${idx})"><i class="ti ti-check"></i> Aprobar y entregar fondos</button>
          <button class="btn btn-danger" onclick="rechazar(${idx})"><i class="ti ti-x"></i> Rechazar</button>
        </div>
      </div>`;}).join('')}`:''}
    ${rend.length?`<div class="card-title" style="margin:.5rem 0 .75rem">Rendiciones a revisar</div>
    ${rend.map(s=>{const idx=solicitudes.indexOf(s);const total=(s.viaticos||0)+(s.hospedaje||0)+(s.reserva||0);const gastado=(s.gastos||[]).reduce((a,g)=>a+(parseFloat(g.importe)||0),0);const saldo=total-gastado;
      return `<div class="card" style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:.75rem">
          <div><div style="font-weight:500;font-size:15px">${s.destino}</div>
          <div style="font-size:12px;color:var(--text2)">${s.solicitante} · ${s.fechaSalida} → ${s.fechaLlegada}</div></div>
          <button class="btn btn-info" style="font-size:12px;padding:5px 12px" onclick="irRendicion(${idx})"><i class="ti ti-eye"></i> Ver detalle</button>
        </div>
        <div style="display:flex;gap:1.5rem;font-size:13px;flex-wrap:wrap;margin-bottom:.75rem">
          <span>Entregado: <strong>${fmt(total)}</strong></span>
          <span>Gastado: <strong>${fmt(gastado)}</strong></span>
          <span style="font-weight:500;color:var(--${saldo>=0?'warning':'success'}-text)">${saldo>=0?'Reintegra':'Recibe'}: ${fmt(Math.abs(saldo))}</span>
        </div>
        <button class="btn btn-success" onclick="cerrar(${idx})"><i class="ti ti-check"></i> Confirmar y cerrar</button>
      </div>`;}).join('')}`:''}
    ${cerr.length?`<div class="card-title" style="margin:.5rem 0 .75rem">Historial</div>
    ${cerr.map(s=>{const total=(s.viaticos||0)+(s.hospedaje||0)+(s.reserva||0);const gastado=(s.gastos||[]).reduce((a,g)=>a+(parseFloat(g.importe)||0),0);
      return `<div class="card" style="margin-bottom:.75rem;opacity:.75">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div><div style="font-weight:500">${s.destino}</div>
          <div style="font-size:12px;color:var(--text2)">${s.solicitante} · ${s.fechaSalida} → ${s.fechaLlegada}</div></div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:13px">${fmt(gastado)} de ${fmt(total)}</span>
            <span class="sbadge s-cerrado"><i class="ti ti-check"></i> Cerrado</span>
          </div>
        </div>
      </div>`;}).join('')}`:''}
    ${!pend.length&&!rend.length&&!cerr.length?`<div class="card" style="text-align:center;padding:3rem">
      <i class="ti ti-building-bank" style="font-size:48px;color:var(--text2)"></i>
      <p style="margin-top:1rem;color:var(--text2)">Sin movimientos pendientes.</p>
    </div>`:''}
  `;
}

async function aprobar(i) {
  try {
    await api({action:'updateStatus',id:solicitudes[i].id,status:'aprobado',usuario:'Tesorero'});
    solicitudes[i].status='aprobado'; updateBadges(); renderTesoreria();
    showToast('Fondos aprobados','success');
  } catch(e){showToast('Error al guardar','danger');}
}
async function rechazar(i) {
  try {
    await api({action:'updateStatus',id:solicitudes[i].id,status:'rechazado',usuario:'Tesorero'});
    solicitudes.splice(i,1); updateBadges(); renderTesoreria();
    showToast('Solicitud rechazada','warning');
  } catch(e){showToast('Error al guardar','danger');}
}
async function cerrar(i) {
  try {
    await api({action:'updateStatus',id:solicitudes[i].id,status:'cerrado',usuario:'Tesorero'});
    solicitudes[i].status='cerrado'; updateBadges(); renderTesoreria();
    showToast('Rendición cerrada','success');
  } catch(e){showToast('Error al guardar','danger');}
}

function checkCfgPass() {
  const p=document.getElementById('cfg-pass').value;
  if (p===CFG.passAdmin){
    document.getElementById('cfg-locked').style.display='none';
    document.getElementById('cfg-unlocked').style.display='block';
    document.getElementById('cfg-viat').value=CFG.viaticos;
    document.getElementById('cfg-hosp').value=CFG.hospedaje;
    document.getElementById('cfg-dias').value=CFG.diasLimite;
  } else {document.getElementById('cfg-err').textContent='Clave incorrecta';}
}
async function guardarConfig() {
  const params={action:'saveConfig',
    viaticos:document.getElementById('cfg-viat').value,
    hospedaje:document.getElementById('cfg-hosp').value,
    diasLimite:document.getElementById('cfg-dias').value};
  const np=document.getElementById('cfg-newpass').value.trim();
  if (np) params.passAdmin=np;
  try {
    await api(params);
    CFG.viaticos=parseFloat(params.viaticos)||60000;
    CFG.hospedaje=parseFloat(params.hospedaje)||100000;
    CFG.diasLimite=parseInt(params.diasLimite)||5;
    if (np) CFG.passAdmin=np;
    closeOverlay('ov-config');
    showToast('Configuración guardada','success');
  } catch(e){showToast('Error al guardar configuración','danger');}
}

cargarDatos();
</script>
</body>
</html>
